                                                    <p className="text-sm text-white font-sans font-medium tracking-normal leading-relaxed text-left break-words drop-shadow-md allow-select">{c}</p>
                                                    <button onClick={() => copyText(c)} className="btn-animate w-full py-3.5 bg-brand-primary text-black hover:bg-white rounded-xl flex items-center justify-center gap-2 text-[10px] uppercase tracking-widest font-bold shadow-[0_0_15px_rgba(6,182,212,0.3)] shrink-0">

          );
        }

        function App() {
          const [showSplash, setShowSplash] = useState(true);
          const [user, setUser] = useState(null); 
          const [isAuthChecking, setIsAuthChecking] = useState(true);
          
          const [activeTab, setActiveTab] = useState(() => {
              return localStorage.getItem('lastActiveTab') || 'sms';
          });
          
          const [usersDB, setUsersDB] = useState({});
          
          const [inventory, setInventory] = useState({ new: [], old: [], textplus: [], gv_bulk: [] });
          const [allOrders, setAllOrders] = useState([]);
          const [deposits, setDeposits] = useState([]);
          const [purchases, setPurchases] = useState([]);
          const [tickets, setTickets] = useState([]);
          const [activeChats, setActiveChats] = useState([]);
          
          const [promoSettings, setPromoSettings] = useState({ code: '', discount: 0, isActive: false });
          const [globalNotice, setGlobalNotice] = useState('');
          const [featureSettings, setFeatureSettings] = useState({ dailyReward: false, referral: false });
          const [bankSettings, setBankSettings] = useState({ bankName: 'Parallex', accountName: 'Samuel Osita Emmanuel', accountNumber: '1120927346', nairaRate: 1500, flutterwaveKey: '', flutterwaveActive: false });
          const [maintenanceSettings, setMaintenanceSettings] = useState({ active: false, message: 'We are currently performing scheduled maintenance. Please check back later.' });
          
          const [cryptoSettings, setCryptoSettings] = useState([]);

          const [smsSettings, setSmsSettings] = useState({ active: true, markup: 1.00 });
          const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
          const [customPayments, setCustomPayments] = useState([]);
          
          const [cart, setCart] = useState([]);
          const [showCart, setShowCart] = useState(false);
          const [notifications, setNotifications] = useState([]);
          const [toastData, setToastData] = useState({ show: false, msg: '', id: 0 });
          
          const [incomingMsg, setIncomingMsg] = useState(null); 
          const [isInitialSyncDone, setIsInitialSyncDone] = useState(false);

          const [authMethod, setAuthMethod] = useState('login');
          const [authError, setAuthError] = useState('');
          const [authSuccessMsg, setAuthSuccessMsg] = useState('');
          const [emailInput, setEmailInput] = useState('');
          const [passwordInput, setPasswordInput] = useState('');
          const [isLoading, setIsLoading] = useState(false);

          useEffect(() => { setTimeout(() => setShowSplash(false), 2000); }, []);

          useEffect(() => {
              if (user) {
                  localStorage.setItem('lastActiveTab', activeTab);
              }
          }, [activeTab, user]);

          const triggerToast = (msg) => { const id = Date.now(); setToastData({ show: true, msg, id }); setTimeout(() => { setToastData(prev => prev.id === id ? { ...prev, show: false } : prev); }, 3000); };
          const addNotification = (title, text) => { setNotifications(prev => [{ id: Date.now(), title, text, time: 'Just now' }, ...prev].slice(0, 5)); };

          const getFriendlyAuthError = (errorMessage) => {
              const msg = String(errorMessage);
              if (msg.includes('invalid-email')) return 'Invalid email address format.';
              if (msg.includes('Invalid login credentials')) return 'Incorrect email or password.';
              if (msg.includes('Email not confirmed')) return 'Please verify your email address before logging in.';
              if (msg.includes('User already registered')) return 'An account with this email already exists.';
              if (msg.includes('Password should be at least')) return 'Password is too weak. Must be at least 6 characters.';
              return msg || 'An error occurred. Please try again.';
          };

          // 🟢 1. AUTHENTICATION (Supabase) 🟢
          useEffect(() => {
              supabase.auth.getSession().then(({ data: { session } }) => {
                  checkUserRole(session?.user);
              });

              const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                  checkUserRole(session?.user);
              });
              
              return () => authListener.subscription.unsubscribe();
          }, []);

          const checkUserRole = async (supaUser) => {
              if (supaUser && supaUser.email) {
                  let currentAdminEmail = 'mdmunnachowdhury0003817@gmail.com';
                  try {
                      const { data } = await supabase.from('store_settings').select('data').eq('id', 'AdminConfig').maybeSingle();
                      if (data && data.data && data.data.adminEmail) {
                          currentAdminEmail = data.data.adminEmail;
                      }
                  } catch(e) {}

                  if (supaUser.email.toLowerCase() !== currentAdminEmail.toLowerCase()) {
                      const { data: uData } = await supabase.from('store_users').select('data').eq('id', supaUser.email.toLowerCase()).maybeSingle();
                      if (!uData) {
                           try {
                               const token = await getAuthToken();
                               await fetch(`${BACKEND_URL}/api/secure-action`, {
                                   method: 'POST',
                                   headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                   body: JSON.stringify({ action: 'create_user', email: supaUser.email.toLowerCase() })
                               });
                           } catch(e) {}
                      }
                  }

                  const savedTab = localStorage.getItem('lastActiveTab');

                  if (supaUser.email.toLowerCase() === currentAdminEmail.toLowerCase()) {
                      setUser({ email: supaUser.email.toLowerCase(), role: 'admin' }); 
                      if(!savedTab || !ADMIN_TABS.some(t => t.id === savedTab)) {
                          setActiveTab('inventory');
                      } else {
                          setActiveTab(savedTab);
                      }
                  } else {
                      setUser({ email: supaUser.email.toLowerCase(), role: 'customer' }); 
                      if(!savedTab || !CUSTOMER_TABS.some(t => t.id === savedTab)) {
                          setActiveTab('sms');
                      } else {
                          setActiveTab(savedTab);
                      }
                  }
              } else {
                  setUser(null);
              }
              setIsAuthChecking(false);
          };

          // 🟢 2. SMART POLLING DATA FETCHING (FIXED TO PREVENT OVERWRITING INPUTS) 🟢
          useEffect(() => {
              if (!user) return;
              let isMounted = true;

              const fetchAllData = async () => {
                  if (!isMounted) return;

                  // Only sync lists from server, let individual state variables handle their own form inputs
                  const { data: settings } = await supabase.from('store_settings').select('*');
                  if (settings) {
                      settings.forEach(s => {
                          const sData = s.data || {};
                          if (s.id === 'Products') setCategories(prev => JSON.stringify(prev) !== JSON.stringify(sData.list || DEFAULT_CATEGORIES) ? (sData.list || DEFAULT_CATEGORIES) : prev);
                          if (s.id === 'CryptoMethods') setCryptoSettings(prev => JSON.stringify(prev) !== JSON.stringify(sData.list || []) ? (sData.list || []) : prev);
                          if (s.id === 'CustomPayments') setCustomPayments(prev => JSON.stringify(prev) !== JSON.stringify(sData.list || []) ? (sData.list || []) : prev);
                      });
                  }

                  const { data: stock } = await supabase.from('store_inventory').select('data').eq('id', 'Stock').maybeSingle();
                  if (stock && stock.data) setInventory(prev => JSON.stringify(prev) !== JSON.stringify(stock.data) ? stock.data : prev);

                  try {
                      const token = await getAuthToken();
                      if (!token) return;
                      const res = await fetch(`${BACKEND_URL}/api/sync`, {
                          method: 'GET',
                          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
                      });
                      
                      const syncData = await res.json();

                      if (syncData.success) {
                          if (user.role === 'admin' && syncData.isAdmin) {
                              let uObj={}; 
                              (syncData.users || []).forEach(u => uObj[u.id] = u.data || {}); 
                              setUsersDB(uObj);
                              
                              setAllOrders((syncData.orders || []).map(d => ({id: d.id, ...(d.data || {}), date: d.data?.date || d.date || new Date().toISOString()})).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                              setDeposits((syncData.deposits || []).map(d => ({id: d.id, ...(d.data || {}), email: d.email || d.data?.email, date: d.data?.date || d.date || new Date().toISOString()})).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                              setPurchases((syncData.purchases || []).map(d => ({id: d.id, ...(d.data || {}), customer: d.customer || d.data?.customer, type: d.type || d.data?.type, date: d.data?.date || d.date || new Date().toISOString()})).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                              setTickets((syncData.tickets || []).map(d => ({id: d.id, ...(d.data || {}), email: d.email || d.data?.email, date: d.data?.date || d.date || new Date().toISOString()})).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                              setActiveChats((syncData.chats || []).map(d => ({id: d.id, userEmail: d.id, ...(d.data || {})})).sort((a,b)=>new Date(b.lastMessageTime || b.last_message_time || 0)-new Date(a.lastMessageTime || a.last_message_time || 0)));
                          } else {
                              if(syncData.myUser) setUsersDB({ [user.email]: syncData.myUser.data || {} });
                              
                              setAllOrders((syncData.orders || []).map(d => ({id: d.id, ...(d.data || {}), date: d.data?.date || d.date || new Date().toISOString()})).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                              setDeposits((syncData.deposits || []).map(d => ({id: d.id, ...(d.data || {}), email: d.email || d.data?.email, date: d.data?.date || d.date || new Date().toISOString()})).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                              setPurchases((syncData.purchases || []).map(d => ({id: d.id, ...(d.data || {}), customer: d.customer || d.data?.customer, type: d.type || d.data?.type, date: d.data?.date || d.date || new Date().toISOString()})).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                              setTickets((syncData.tickets || []).map(d => ({id: d.id, ...(d.data || {}), email: d.email || d.data?.email, date: d.data?.date || d.date || new Date().toISOString()})).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                          }
                      }
                  } catch(e) {
                      console.error("Sync error", e);
                  } finally {
                      setIsInitialSyncDone(true);
                  }
              };

              fetchAllData();
              const intervalId = setInterval(fetchAllData, 6000); 
              return () => { isMounted = false; clearInterval(intervalId); };
          }, [user]);

          // Load initial settings once on mount or when user role is determined
          useEffect(() => {
              if(!user) return;
              const loadInitialSettings = async () => {
                  const { data: settings } = await supabase.from('store_settings').select('*');
                  if (settings) {
                      settings.forEach(s => {
                          const sData = s.data || {};
                          if (s.id === 'SMS') { setSmsSettings({ active: sData.active !== false, markup: sData.markup || 1.00 }); }
                          if (s.id === 'Bank') { setBankSettings(sData); }
                          if (s.id === 'Notice') { setGlobalNotice(sData.text || ''); }
                          if (s.id === 'Features') { setFeatureSettings(sData); }
                          if (s.id === 'Maintenance') { setMaintenanceSettings(sData); }
                          if (s.id === 'PromoCode') { setPromoSettings(sData); }
                      });
                  }
              };
              loadInitialSettings();
          }, [user?.email]);

          useEffect(() => {
              if (!user || user.role === 'admin') return;

              const checkPendingInvoices = async () => {
                  try {
                      const pendingDeposits = deposits.filter(d => {
                         if(d.email !== user.email) return false;
                         const status = d.data?.status || d.status;
                         const method = d.data?.method || d.method;
                         if (status !== 'Awaiting Payment' && status !== 'Pending Review') return false;
                         if (!String(method).includes('NOWPayments')) return false;
                         return true;
                      });

                      if (pendingDeposits.length === 0) return;

                      const token = await getAuthToken();
                      
                      for(const dep of pendingDeposits) {
                          const res = await fetch(`${BACKEND_URL}/api/nowpayments/verify`, {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                              body: JSON.stringify({ invoiceId: dep.id })
                          });
                          
                          const result = await res.json();
                          if(result.success && result.message && result.message.includes('Verified')) {
                              triggerToast(`Payment Auto-Verified: $${dep.data?.amount || dep.amount} Added!`);
                              addNotification('Deposit Auto-Approved', `$${dep.data?.amount || dep.amount} added to your balance.`);
                              
                              setDeposits(prev => prev.map(dItem => dItem.id === dep.id ? { ...dItem, status: 'Approved', data: {...(dItem.data || {}), status: 'Approved'} } : dItem));
                          }
                      }
                  } catch (e) {}
              };

              const interval = setInterval(checkPendingInvoices, 10000);
              return () => clearInterval(interval);
          }, [user, deposits]);

          const handleAuthSubmit = async (e) => {
            e.preventDefault(); setAuthError(''); setAuthSuccessMsg(''); setIsLoading(true);
            let email = emailInput.trim(); let pwd = passwordInput.trim();
            if (!email || !pwd) { setAuthError('Email and Password are required.'); setIsLoading(false); return; }
            
            if (authMethod === 'admin') {
              let currentAdminEmail = 'mdmunnachowdhury0003817@gmail.com'; 
              try { const { data } = await supabase.from('store_settings').select('data').eq('id', 'AdminConfig').maybeSingle(); if (data && data.data) currentAdminEmail = data.data.adminEmail || currentAdminEmail; } catch (e) {}

              if (email.toLowerCase() !== currentAdminEmail.toLowerCase()) { setAuthError('Access Denied: Invalid Admin Clearance.'); setIsLoading(false); return; }
              const { error } = await supabase.auth.signInWithPassword({ email, password: pwd });
              if (error) setAuthError('Incorrect Password.');
              else setAuthSuccessMsg('Admin Login Successful.');
              setIsLoading(false); return;
            }

            try {
              if (authMethod === 'signup') {
                const { data, error } = await supabase.auth.signUp({ email, password: pwd });
                if (error) throw error;
                
                const token = data.session?.access_token || (await getAuthToken());
                if(token) {
                    await fetch(`${BACKEND_URL}/api/secure-action`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ action: 'create_user', email: email.toLowerCase(), password: pwd })
                    });
                }
                
                setAuthSuccessMsg('Account created! Please verify your email before logging in.'); 
                setAuthMethod('login'); 
              } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password: pwd });
                if (error) throw error;
                setAuthSuccessMsg('Login Successful.');
              }
            } catch (error) { 
                setAuthError(getFriendlyAuthError(error.message)); 
            } finally { setIsLoading(false); }
          };

          const handleForgotPassword = async () => {
            if (!emailInput.trim()) { setAuthError('Enter your email address first to reset password.'); return; }
            setIsLoading(true);
            try {
              const { error } = await supabase.auth.resetPasswordForEmail(emailInput.trim());
              if(error) throw error;
              setAuthError(''); setAuthSuccessMsg('Password reset link has been sent to your email.');
            } catch (error) { setAuthError(getFriendlyAuthError(error.message)); } 
            finally { setIsLoading(false); }
          };

          const handleLogout = () => { 
              supabase.auth.signOut().then(() => { 
                  setUser(null); 
                  setCart([]); 
                  setShowCart(false); 
                  setEmailInput(''); 
                  setPasswordInput(''); 
                  localStorage.removeItem('lastActiveTab');
              }); 
          };

          if (showSplash) return <SplashScreen />;

          if (isAuthChecking) return <div className="min-h-screen flex items-center justify-center bg-[#030712]"><RefreshCw className="w-8 h-8 text-brand-primary animate-spin"/></div>;

          if (!user) {
            return (
              <div className="min-h-screen flex items-center justify-center p-4 relative font-sans w-full bg-transparent text-white">
                <FloatingLogos />
                <div className="w-full max-w-[400px] animate-matrix-in z-10">
                  <div className="flex flex-col items-center mb-8">
                    <EliteLogo className="w-20 h-20 mb-4 drop-shadow-[0_0_15px_rgba(191,149,63,0.5)]" />
                    <h2 className="text-4xl sm:text-5xl font-bold tracking-[0.2em] text-white uppercase text-center drop-shadow-md">Verify<span className="font-light text-brand-primary">Hub</span></h2>
                    <div className="text-sm tracking-[0.5em] text-yellow-500 font-bold mt-2">ELITE</div>
                  </div>
                  
                  <div className="glass-effect rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                    {authMethod !== 'admin' && (
                        <div className="grid grid-cols-2 gap-2 glass-panel p-1 rounded-xl mb-8 border border-white/5">
                             <button type="button" onClick={() => { setAuthMethod('login'); setAuthError(''); setAuthSuccessMsg(''); }} className={`btn-animate flex items-center justify-center py-3 rounded-lg text-xs font-bold uppercase tracking-widest ${authMethod === 'login' ? 'bg-white text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Login</button>
                             <button type="button" onClick={() => { setAuthMethod('signup'); setAuthError(''); setAuthSuccessMsg(''); }} className={`btn-animate flex items-center justify-center py-3 rounded-lg text-xs font-bold uppercase tracking-widest ${authMethod === 'signup' ? 'bg-white text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Sign Up</button>
                        </div>
                    )}
                    {authMethod === 'admin' && <div className="text-center mb-8 pb-4 border-b border-white/10"><span className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center justify-center gap-2"><ShieldCheck className="w-4 h-4"/> Admin Portal</span></div>}
                    
                    <form onSubmit={handleAuthSubmit} className="space-y-5">
                      {authError && <div className="text-red-400 text-[11px] font-bold glass-panel border-red-500/30 p-4 rounded-xl flex items-center gap-3 leading-relaxed"><AlertTriangle className="w-5 h-5 shrink-0"/>{authError}</div>}
                      {authSuccessMsg && <div className="text-green-400 text-[11px] font-bold glass-panel border-green-500/30 p-4 rounded-xl flex items-center gap-3 leading-relaxed"><CheckCircle className="w-5 h-5 shrink-0"/>{authSuccessMsg}</div>}
                      
                      <div className="space-y-2">
                        <label className="text-[9px] font-bold text-gray-400 pl-1 uppercase tracking-widest">Email Address</label>
                        <input type="email" value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="name@example.com" required className="glass-input allow-select" />
                      </div>
                      <div className="space-y-2">
                        <div className="flex justify-between items-center px-1">
                           <label className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Password</label>
                           {(authMethod === 'login' || authMethod === 'admin') && <button type="button" onClick={handleForgotPassword} className="text-[9px] font-bold text-brand-primary hover:text-white transition-colors uppercase tracking-widest">Forgot?</button>}
                        </div>
                        <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="••••••••" required className="glass-input allow-select" />
                      </div>
                      <div className="pt-6">
                        <button type="submit" disabled={isLoading} className="btn-animate w-full glass-effect hover:bg-white text-white hover:text-black border border-white/20 font-bold py-4 rounded-2xl text-xs tracking-widest uppercase flex items-center justify-center gap-2 shadow-[0_5px_20px_rgba(255,255,255,0.2)]">
                            {isLoading ? <span className="flex items-center gap-2"><RefreshCw className="w-4 h-4 animate-spin"/> Processing...</span> : (authMethod === 'signup' ? 'Create Account' : authMethod === 'login' ? 'Access Terminal' : 'Admin Login')}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            );
          }

          const currentUserBalance = user.role === 'customer' ? (usersDB[user.email]?.balance || 0) : 0;
          const currentUserTier = user.role === 'customer' ? getTier(usersDB[user.email]?.totalSpent || 0) : null;

          return (
            <div className="min-h-screen w-full relative overflow-x-hidden font-sans pb-24 flex flex-col bg-transparent text-white">
              <FloatingLogos />
              <MessageNotification msg={incomingMsg} onClose={() => setIncomingMsg(null)} />
              
              {toastData.show && createPortal(
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] w-[90%] sm:w-auto max-w-sm animate-fade-in-up">
                  <div className="glass-effect p-3.5 rounded-2xl shadow-xl flex items-center gap-3 border border-white/20 bg-[#030712]/90">
                    <CheckCircle className="w-4 h-4 text-brand-primary shrink-0" />
                    <span className="font-bold text-[10px] sm:text-xs tracking-widest text-white uppercase">{toastData.msg}</span>
                  </div>
                </div>, document.body
              )}

              <header className="sticky top-0 z-40 w-full glass-effect rounded-none border-t-0 border-x-0 border-b border-white/10">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-3 sm:gap-4">
                      <div className="w-10 h-10 rounded-xl glass-panel flex items-center justify-center border border-white/20">
                        <EliteLogo className="w-7 h-7" />
                      </div>
                      <span className="text-xl font-light tracking-[0.25em] text-white hidden sm:block uppercase">Verify<span className="font-bold text-brand-primary">Hub</span> <span className="text-[10px] text-yellow-500 font-bold ml-1 tracking-[0.3em]">ELITE</span></span>
                  </div>
                  <div className="flex items-center gap-3 sm:gap-4">
                    {user.role === 'customer' && (
                        <button onClick={() => setShowCart(true)} className="btn-animate relative p-3 rounded-xl glass-panel text-white hover:bg-white/10 transition-colors border border-white/10">
                            <ShoppingCart className="w-4 h-4" strokeWidth={1.5}/>
                            {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">{cart.length}</span>}
                        </button>
                    )}
                    {user.role === 'customer' && (
                        <div className="glass-panel px-4 py-2.5 rounded-xl flex items-center gap-2 border border-white/10 cursor-default">
                            <Wallet className="w-4 h-4 text-brand-primary opacity-90" />
                            <span className="font-mono font-bold text-xs sm:text-sm tracking-wider text-white">${Number(currentUserBalance).toFixed(2)}</span>
                        </div>
                    )}
                    <button onClick={handleLogout} className="btn-animate p-3 glass-panel text-white hover:text-red-400 transition-colors border border-white/10"><LogOut className="w-4 h-4" strokeWidth={1.5}/></button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 mt-8 relative z-10 w-full flex-grow flex flex-col items-center">
                {globalNotice && (
                  <div className="w-full mb-6 glass-panel border-l-4 border-l-brand-primary p-4 rounded-2xl flex items-start sm:items-center gap-4">
                     <Megaphone className="w-5 h-5 text-brand-primary shrink-0 mt-0.5 sm:mt-0" />
                     <p className="text-xs font-medium text-gray-200 leading-relaxed tracking-wide">{globalNotice}</p>
                  </div>
                )}

                {(!maintenanceSettings?.active || user.role === 'admin') && (
                    <div className="w-full relative z-30 mb-8">
                      <div className="glass-effect rounded-[24px] p-1.5 sm:p-2 grid grid-cols-5 gap-1 w-full border border-white/10 mx-auto max-w-5xl">
                        {(user.role === 'admin' ? ADMIN_TABS : CUSTOMER_TABS).map(tab => (
                          <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`btn-animate relative flex flex-col items-center justify-center py-3 sm:py-3.5 px-0.5 sm:px-2 rounded-xl min-w-0 group ${activeTab === tab.id ? 'bg-white shadow-[0_4px_15px_rgba(255,255,255,0.2)]' : 'hover:bg-white/10'}`}>
                              <div className="relative z-10 flex flex-col items-center justify-center w-full">
                                  <tab.icon className={`w-4 h-4 sm:w-5 sm:h-5 transition-transform duration-200 ${activeTab === tab.id ? 'scale-110 mb-1 text-black' : 'group-hover:scale-110 group-hover:-translate-y-0.5 mb-1 text-gray-400 group-hover:text-white'}`} strokeWidth={activeTab === tab.id ? 2 : 1.5} /> 
                                  <span className={`text-[7.5px] sm:text-[9px] min-[400px]:text-[10px] leading-tight mt-0.5 uppercase tracking-wider text-center w-full whitespace-normal break-words px-0.5 ${activeTab === tab.id ? 'font-bold text-black' : 'font-medium text-gray-400 group-hover:text-white'}`}>
                                      {tab.label}
                                      </span>
                              </div>
                          </button>
                        ))}
                      </div>
                    </div>
                )}

                <div className="w-full relative tab-transition-enter" key={activeTab}>
                    <ErrorBoundary>
                        {user.role === 'admin' ? (
                          <AdminDashboard inventory={inventory} orders={allOrders} deposits={deposits} setDeposits={setDeposits} categories={categories} usersDB={usersDB} setUsersDB={setUsersDB} purchases={purchases} tickets={tickets} triggerToast={triggerToast} promoSettings={promoSettings} globalNotice={globalNotice} featureSettings={featureSettings} bankSettings={bankSettings} cryptoSettings={cryptoSettings} customPayments={customPayments} smsSettings={smsSettings} activeChats={activeChats} activeTab={activeTab} maintenanceSettings={maintenanceSettings} isInitialSyncDone={isInitialSyncDone} />
                        ) : maintenanceSettings?.active ? (
                          <div className="w-full flex flex-col items-center justify-center py-20 animate-fade-in-up">
                              <div className="w-20 h-20 bg-red-900/20 border border-red-500/50 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(239,68,68,0.2)]">
                                  <Settings className="w-10 h-10 text-red-500 animate-spin-slow" />
                              </div>
                              <h2 className="text-2xl font-bold tracking-widest text-white uppercase mb-4 text-center">System Maintenance</h2>
                              <div className="glass-panel p-6 rounded-2xl max-w-lg w-full text-center border border-white/10">
                                  <p className="text-gray-300 leading-relaxed tracking-wide font-mono text-sm allow-select whitespace-pre-wrap">{maintenanceSettings.message}</p>
                              </div>
                          </div>
                        ) : (
                          <>
                              {activeTab === 'sms' && <CustomerDashboardSMS user={user} balance={currentUserBalance} triggerToast={triggerToast} smsSettings={smsSettings} />}
                              {activeTab === 'store' && <CustomerDashboardStore inventory={inventory} categories={categories} cart={cart} setCart={setCart} triggerToast={triggerToast} />}
                              {activeTab === 'add_funds' && <CustomerDashboardFunds deposits={deposits} setDeposits={setDeposits} user={user} triggerToast={triggerToast} addNotification={addNotification} bankSettings={bankSettings} cryptoSettings={cryptoSettings} customPayments={customPayments} />}
                              {activeTab === 'my_accounts' && <CustomerDashboardVault user={user} purchases={purchases} triggerToast={triggerToast} />}
                              {activeTab === 'profile' && <CustomerDashboardProfile user={user} balance={currentUserBalance} tier={currentUserTier} userInfo={usersDB[user.email]} allOrders={allOrders} deposits={deposits} purchases={purchases} tickets={tickets.filter(t => t && t.email === user.email)} featureSettings={featureSettings} triggerToast={triggerToast} />}
                          </>
                        )}
                    </ErrorBoundary>
                </div>
              </main>

              {showCart && user.role === 'customer' && <CartModal cart={cart} setCart={setCart} setShowCart={setShowCart} balance={currentUserBalance} user={user} promoSettings={promoSettings} triggerToast={triggerToast} addNotification={addNotification} />}
              
              {user && user.role === 'customer' && <LiveChatWidget user={user} setIncomingMsg={setIncomingMsg} />}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
