        function LiveChatWidget({ user, setIncomingMsg }) {
            const [isOpen, setIsOpen] = useState(false);
            const [message, setMessage] = useState('');
            const [chatMessages, setChatMessages] = useState([]);
            const [unreadCount, setUnreadCount] = useState(0);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const fetchChat = async () => {
                    const { data } = await supabase.from('store_chats').select('*').eq('user_email', user.email).order('timestamp', { ascending: true });
                    if (data) {
                        const newMsgs = data.map(m => ({ id: m.id, ...m.data, timestamp: m.timestamp }));
                        if(newMsgs.length > chatMessages.length && !isOpen) {
                            const lastMsg = newMsgs[newMsgs.length - 1];
                            if(lastMsg.sender === 'admin') {
                                setIncomingMsg(lastMsg.text);
                                setUnreadCount(prev => prev + 1);
                            }
                        }
                        setChatMessages(newMsgs);
                    }
                };
                fetchChat();
                const intId = setInterval(fetchChat, 4000);
                return () => clearInterval(intId);
            }, [isOpen, user.email, setIncomingMsg, chatMessages.length]);

            useEffect(() => { if (isOpen) { setUnreadCount(0); setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100); } }, [isOpen, chatMessages]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!message.trim()) return;
                const msgText = message;
                setMessage(''); 
                try {
                    const token = await getAuthToken();
                    await fetch(`${BACKEND_URL}/api/secure-action`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ action: 'send_chat', text: msgText })
                    });
                } catch(err) {}
            };

            return (
                <>
                    <button onClick={() => setIsOpen(!isOpen)} className="btn-animate fixed bottom-6 right-6 z-[150] w-14 h-14 bg-white rounded-full shadow-[0_4px_15px_rgba(255,255,255,0.3)] flex items-center justify-center text-black">
                        {isOpen ? <X className="w-6 h-6" /> : <MessageSquare className="w-6 h-6" />}
                        {!isOpen && unreadCount > 0 && (
                            <span className="absolute -top-1 -right-1 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white animate-pulse shadow-lg">
                                {unreadCount}
                            </span>
                        )}
                    </button>
                    {isOpen && (
                        <div className="fixed bottom-24 right-6 z-[150] w-[340px] h-[480px] glass-effect rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.9)] flex flex-col overflow-hidden origin-bottom-right animate-fade-in-up">
                            <div className="bg-[rgba(255,255,255,0.05)] border-b border-white/10 p-5 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                   <div className="w-2.5 h-2.5 bg-brand-primary rounded-full animate-pulse"></div>
                                   <h3 className="text-white font-bold text-[11px] tracking-widest uppercase">Admin Support</h3>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-gray-400 hover:text-white transition-colors"><X className="w-4 h-4"/></button>
                            </div>
                            <div className="flex-grow overflow-y-auto p-5 space-y-4 custom-scrollbar bg-transparent">
                                {chatMessages.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-40">
                                        <Headset className="w-12 h-12 mb-4 text-white" strokeWidth={1.5} />
                                        <p className="text-[10px] text-gray-300 font-mono text-center uppercase tracking-widest">Encrypted Channel Open</p>
                                    </div>
                                ) : (
                                    chatMessages.map((msg, i) => (
                                        <div key={msg.id} className={`flex flex-col animate-swoosh-in ${msg.sender === 'user' ? 'items-end' : 'items-start'}`} style={{animationDelay: `${i * 0.03}s`}}>
                                            <div className={`px-4 py-3 rounded-2xl max-w-[85%] text-[12px] font-medium leading-relaxed shadow-lg allow-select ${msg.sender === 'user' ? 'bg-white text-black rounded-tr-sm' : 'glass-panel text-white rounded-tl-sm'}`}>
                                                {msg.text}
                                            </div>
                                            <span className="text-[8px] text-gray-500 mt-1.5 font-mono tracking-wider">
                                                {msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...'}
                                            </span>
                                        </div>
                                    ))
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                            <form onSubmit={sendMessage} className="bg-[rgba(0,0,0,0.5)] border-t border-white/10 p-4 flex gap-3 items-center">
                                <input type="text" value={message} onChange={e => setMessage(e.target.value)} placeholder="Type a message..." className="glass-input allow-select !py-3"/>
                                <button type="submit" disabled={!message.trim()} className="btn-animate bg-white text-black p-3.5 rounded-xl disabled:opacity-50"><Send className="w-4 h-4" /></button>
                            </form>
                        </div>
                    )}
                </>
            );
        }

        // ==========================================
        // 🌟 ASSET STORE MODULE
        // ==========================================
        function CustomerDashboardStore({ inventory, categories, cart, setCart, triggerToast, bankSettings }) {
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedStates, setSelectedStates] = useState({}); 
          const filteredCategories = categories.filter(c => (c?.name || '').toLowerCase().includes((searchQuery || '').toLowerCase()));

          // 🟢 ELEGANT SCROLL REVEAL OBSERVER (ONE-TIME ONLY) 🟢
          useEffect(() => {
              const observer = new IntersectionObserver((entries, obs) => {
                  entries.forEach(entry => {
                      if (entry.isIntersecting) {
                          entry.target.classList.add('visible');
                          obs.unobserve(entry.target); // 👈 ম্যাজিক: একবার অ্যানিমেশন হওয়ার পর অবজার্ভ করা বন্ধ করে দেবে
                      }
                  });
              }, { threshold: 0.1, rootMargin: "0px 0px -20px 0px" });

              const elements = document.querySelectorAll('.reveal-card');
              elements.forEach(el => observer.observe(el));

              return () => observer.disconnect();
          }, [filteredCategories]);

          const handleAddToCart = (product) => {
              const selectedState = selectedStates[product.id];
              if (!selectedState && getAvailableStates(product.id).length > 0) {
                  triggerToast("Please select a State.");
                  return;
              }
              const finalState = (!selectedState || selectedState === 'Random') ? undefined : selectedState;
              const cartItem = { ...product };
              if (finalState) cartItem.selectedState = finalState;
              
              setCart([...cart, cartItem]); 
              triggerToast(`Added to cart.`);
          };

          const handleStateChange = (productId, stateStr) => {
              setSelectedStates(prev => ({...prev, [productId]: stateStr}));
          };

          const getAvailableStates = (productId) => {
              const stock = inventory[productId] || [];
              if (stock.length === 0) return [];
              const states = new Set();
              stock.forEach(accData => {
                  const match = String(accData).match(/📍 STATE:\s*\n?([^\n]+)/i);
                  if (match && match[1]) states.add(match[1].trim());
              });
              return Array.from(states).sort();
          };

          return (
            <div className="space-y-6 w-full relative z-10 animate-matrix-in">
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4 w-full bg-white p-5 rounded-3xl border border-gray-200 shadow-sm relative overflow-hidden">
                <div className="absolute top-0 left-0 w-1.5 h-full bg-brand-primary"></div>
                <div className="text-center sm:text-left w-full pl-4 py-1">
                  <h1 className="text-xl sm:text-2xl font-bold text-gray-900 tracking-[0.25em] uppercase mb-1">Buy <span className="font-light text-brand-primary">Accounts</span></h1>
                  <p className="text-gray-500 text-[9px] sm:text-[10px] font-mono tracking-widest uppercase">Verified Static Entities</p>
                </div>
                <div className="w-full sm:w-72 relative">
                     <Search className="w-4 h-4 text-gray-400 absolute left-4 top-3.5" />
                     <input type="text" placeholder="Search accounts..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-2xl pl-12 py-3 focus:outline-none focus:ring-2 focus:ring-brand-primary/30 focus:border-brand-primary transition-all allow-select" />
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 w-full">
                  {filteredCategories.map((product, idx) => {
                      const Icon = product.icon || Package;
                      const availableStates = getAvailableStates(product.id);
                      const stockCount = inventory[product.id] ? inventory[product.id].length : 0;
                      const isOutOfStock = stockCount === 0;

                      return (
                          <div key={product.id} className={`reveal-card relative glass-panel rounded-3xl p-6 flex flex-col group border border-white/5 ${isOutOfStock ? "opacity-50 grayscale" : "hover-enabled"}`} style={{transitionDelay: `${(idx % 4) * 0.1}s`}}>
                              
                              <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-brand-primary to-transparent scale-x-0 group-hover:scale-x-100 transition-transform duration-700 ease-out"></div>

                              {isOutOfStock && (
                                  <div className="absolute inset-0 z-20 flex items-center justify-center bg-[#000]/80 rounded-3xl pointer-events-none">

                  {filteredCategories.length === 0 && <div className="col-span-full py-16 text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest"><Search className="w-8 h-8 mx-auto mb-3 opacity-20"/>No accounts found.</div>}

        // ==========================================
        // FUNDS MODULE
        // ==========================================
        function CustomerDashboardFunds({ user, triggerToast, addNotification, bankSettings, cryptoSettings, customPayments, deposits, setDeposits }) {
          const [hiddenInvoices, setHiddenInvoices] = useState(() => {
              try {
                  const stored = localStorage.getItem(`hiddenInvoices_${user?.email}`);
                  return stored ? JSON.parse(stored) : [];
              } catch(e) { return []; }
          });
          
          const [isGenerating, setIsGenerating] = useState(false); 
          const [isVerifyingClick, setIsVerifyingClick] = useState(false); 
          const [cryptoAmountInput, setCryptoAmountInput] = useState(''); 

          const [manualAmount, setManualAmount] = useState('');
          const [manualMethod, setManualMethod] = useState('Local Bank Transfer');
          const [manualTxId, setManualTxId] = useState('');

          useEffect(() => {
              if(user?.email) {
                  localStorage.setItem(`hiddenInvoices_${user.email}`, JSON.stringify(hiddenInvoices));
              }
          }, [hiddenInvoices, user]);

          const pendingCrypto = (deposits || []).find(d => {
              if (!d || d.email !== user?.email) return false;
              if (hiddenInvoices.includes(d.id)) return false; 

              const status = d.data?.status || d.status;
              const method = d.data?.method || d.method;

              if (status !== 'Awaiting Payment' && status !== 'Pending Review') return false;
              if (!String(method).includes('NOWPayments')) return false; 
              
              return true;
          });

          const isNowPayments = pendingCrypto && String(pendingCrypto.data?.method || pendingCrypto.method).includes('NOWPayments');

          const startAutoDeposit = async (e) => {
              e.preventDefault();
              if (isGenerating) return; 
              const baseAmount = parseFloat(cryptoAmountInput);
              if (isNaN(baseAmount) || baseAmount < 1) { triggerToast('Minimum deposit is $1.00'); return; }
              
              setIsGenerating(true); 
              
              try {
                  const token = await getAuthToken();
                  const response = await fetch(`${BACKEND_URL}/api/nowpayments/create-invoice`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ amount: baseAmount })
                  });
                  
                  const result = await response.json();
                  
                  if(result.success && result.url) {
                      window.open(result.url, '_blank'); 
                      triggerToast("Invoice created. Redirecting to payment page...");
                      setCryptoAmountInput('');
                  } else {
                      triggerToast(result.message || "Failed to generate invoice.");
                  }
              } catch (err) { 
                  triggerToast("Request failed."); 
              }
              setIsGenerating(false);
          };

          const handleNowPaymentsVerify = async (e) => {
              if(e) e.preventDefault();
              if (!pendingCrypto) return;
              setIsVerifyingClick(true);
              try {
                  const token = await getAuthToken();
                  const response = await fetch(`${BACKEND_URL}/api/nowpayments/verify`, {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ invoiceId: pendingCrypto.id })
                  });
                  const result = await response.json();
                  if (result.success) {
                      triggerToast(result.message || `Payment Verified!`);
                      addNotification('Deposit Successful', `Balance updated.`);
                      
                      // 🟢 UPDATE UI IMMEDIATELY 🟢
                      setDeposits(prev => prev.map(d => d.id === pendingCrypto.id ? { ...d, status: 'Approved', data: {...(d.data || {}), status: 'Approved'} } : d));
                      setHiddenInvoices(prev => [...prev, pendingCrypto.id]); // Hide invoice
                      
                  } else {
                      triggerToast(result.message || 'Payment not completed yet. Try again later.');
                  }
              } catch (err) {
                  triggerToast('Network error while checking.');
              } finally {
                  setIsVerifyingClick(false);
              }
          };

          const cancelAutoPay = (e) => {
              if(e) e.preventDefault(); 
              if (pendingCrypto && pendingCrypto.id) {
                  const newArr = [...hiddenInvoices, pendingCrypto.id];
                  setHiddenInvoices(newArr);
                  localStorage.setItem(`hiddenInvoices_${user?.email}`, JSON.stringify(newArr));
                  triggerToast('Invoice cancelled successfully.');
              }
          };

          const submitManualDeposit = async (e) => {
              e.preventDefault();
              const amt = parseFloat(manualAmount);
              if (isNaN(amt) || amt < 1) return triggerToast("Minimum deposit is $1");
              if (!manualTxId.trim()) return triggerToast("Please provide Transaction ID/Sender Details");
              
              const newInvoiceId = 'DEP-MANUAL-' + Date.now();
              try {
                  const token = await getAuthToken();
                  await fetch(`${BACKEND_URL}/api/secure-action`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ action: 'create_deposit', id: newInvoiceId, amount: amt, method: manualMethod, txId: manualTxId })
                  });
                  triggerToast(`Deposit request sent! Admin will review shortly.`);
                  setManualAmount('');
                  setManualTxId('');
                  
                  // Optimistic UI Update
                  setDeposits(prev => [{ id: newInvoiceId, email: user.email, date: new Date().toISOString(), status: 'Pending Review', amount: amt, method: manualMethod, data: { amount: amt, method: manualMethod, status: 'Pending Review', txId: manualTxId, date: new Date().toISOString() } }, ...prev]);
              } catch(e) {
                  triggerToast("Failed to submit request.");
              }
          }

          const copyToClipboard = (text) => {
             if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => triggerToast("Copied!"));
             else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
          };

          const selectedCustomPayment = (customPayments || []).find(p => p.name === manualMethod);

          return (
            <div className="animate-matrix-in grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
              
              {/* 🟢 LEFT COLUMN: AUTO CRYPTO DEPOSIT 🟢 */}
              <div className="space-y-6 sm:space-y-8 w-full">
                <div className="bg-white shadow-sm rounded-3xl p-6 sm:p-8 h-fit border border-gray-200">
                  <h2 className="text-sm font-bold tracking-widest mb-6 text-gray-900 flex items-center gap-2 uppercase">
                     <Zap className="w-4 h-4 text-brand-primary"/> Auto Crypto Deposit (NOWPayments)
                  </h2>
                  
                  {!pendingCrypto ? (
                      <div className="mt-4">
                        <form onSubmit={startAutoDeposit} className="space-y-5 w-full">
                          <div>
                            <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Amount (USD)</label>
                            <div className="relative">
                               <DollarSign className="w-4 h-4 text-gray-400 absolute left-4 top-3.5" />
                               <input type="number" step="1" min="1" name="amount" value={cryptoAmountInput} onChange={e => setCryptoAmountInput(e.target.value)} required placeholder="10" className="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl pl-11 py-3 focus:outline-none focus:ring-2 focus:ring-brand-primary/30 focus:border-brand-primary transition-all allow-select font-mono" />
                            </div>
                          </div>
                          <button type="submit" disabled={isGenerating} className="btn-animate w-full bg-gray-900 hover:bg-black text-white font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs h-12 mt-2 disabled:opacity-50 shadow-md">
                              {isGenerating ? <RefreshCw className="w-4 h-4 animate-spin"/> : <DollarSign className="w-4 h-4"/>}
                              {isGenerating ? 'Processing...' : 'Pay with Crypto'}
                          </button>
                        </form>
                      </div>
                  ) : (
                      isNowPayments && (
                          <div className="bg-gray-50 border border-gray-200 rounded-2xl p-6 text-center space-y-6 relative overflow-hidden mt-6 animate-fade-in-up shadow-inner">
                              <p className="text-[10px] font-bold text-gray-900 flex items-center justify-center gap-2 pt-4 uppercase tracking-[0.3em]">
                                  <span className="w-1.5 h-1.5 bg-brand-primary rounded-full animate-pulse"></span> Invoice Active
                              </p>
                              
                              <div className="text-3xl sm:text-4xl font-light font-mono text-gray-900 tracking-widest allow-select">
                                  ${pendingCrypto.data?.amount || pendingCrypto.amount}
                              </div>
                              <p className="text-xs text-gray-500 font-mono mt-2">Complete your payment in the NOWPayments tab.</p>
                              
                              <div className="flex flex-col gap-3 pt-4 border-t border-gray-200 w-full">
                                  <button type="button" onClick={(e) => { e.preventDefault(); window.open(pendingCrypto.data?.invoice_url, '_blank'); }} className="btn-animate w-full bg-white hover:bg-gray-50 text-gray-900 border border-gray-200 shadow-sm font-bold py-3.5 px-6 rounded-2xl flex items-center justify-center gap-2 uppercase tracking-widest text-[10px]">
                                      Open Payment Page
                                  </button>
                                  <button type="button" onClick={handleNowPaymentsVerify} disabled={isVerifyingClick} className="btn-animate w-full bg-brand-primary hover:opacity-90 text-white font-bold py-3.5 px-6 rounded-2xl flex items-center justify-center gap-2 uppercase tracking-widest text-[11px] disabled:opacity-50 shadow-[0_4px_15px_rgba(59,130,246,0.3)]">
                                      {isVerifyingClick ? <RefreshCw className="w-4 h-4 animate-spin"/> : <CheckCircle className="w-4 h-4"/>}
                                      {isVerifyingClick ? 'Verifying...' : 'Verify Payment'}
                                  </button>
                                  <button type="button" onClick={cancelAutoPay} className="btn-animate text-[9px] text-gray-400 hover:text-red-500 font-bold uppercase tracking-widest transition-colors mt-2">Cancel Invoice</button>
                              </div>
                          </div>
                      )
                  )}
                </div>
              </div>

              {/* 🟢 RIGHT COLUMN: MANUAL DEPOSIT 🟢 */}
              <div className="space-y-6 sm:space-y-8 w-full">
                <div className="bg-white shadow-sm rounded-3xl p-6 sm:p-8 border border-gray-200">
                  <div className="flex justify-between items-start mb-6 pb-4 border-b border-gray-100">
                     <h3 className="text-sm font-bold tracking-widest text-gray-900 flex items-center gap-2 uppercase">
                       <Building className="w-4 h-4 text-brand-primary"/> Manual Deposit
                     </h3>
                  </div>

                  <div className="mb-6">
                      <label className="block text-[9px] font-bold text-gray-500 mb-2.5 uppercase tracking-[0.2em] ml-1">Select Payment Method</label>
                      <div className="relative">
                          <select value={manualMethod} onChange={e => setManualMethod(e.target.value)} className="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-brand-primary/30 focus:border-brand-primary transition-all appearance-none cursor-pointer font-mono font-bold tracking-wide allow-select">
                              <option value="Local Bank Transfer">Local Bank Transfer</option>
                              {(customPayments || []).map(p => (
                                  <option key={p.id} value={p.name}>{p.name}</option>
                              ))}
                          </select>
                          <ChevronDown className="w-4 h-4 text-gray-400 absolute right-4 top-4 pointer-events-none" />
                      </div>
                  </div>
                  
                  {/* Bank Details Box */}
                  {manualMethod === 'Local Bank Transfer' ? (
                      <div className="bg-gray-50 border border-gray-200 rounded-xl p-5 mb-6 text-xs font-mono tracking-wide space-y-3 shadow-inner">
                        <div className="flex justify-between items-center border-b border-gray-200 pb-2"><span className="text-gray-500">Bank</span> <span className="font-bold text-gray-900">{bankSettings?.bankName || 'Parallex'}</span></div>
                        <div className="flex justify-between items-center border-b border-gray-200 pb-2 pt-1"><span className="text-gray-500">Name</span> <span className="font-bold text-gray-900 text-right">{bankSettings?.accountName || 'Samuel Osita Emmanuel'}</span></div>
                        <div className="flex justify-between items-center border-b border-gray-200 pb-2 pt-1"><span className="text-gray-500">A/C No.</span> <span className="text-gray-900 font-bold text-sm allow-select">{bankSettings?.accountNumber || '1120927346'}</span></div>
                        <div className="flex justify-between items-center pt-1"><span className="text-gray-500">Rate</span> <span className="text-brand-primary font-bold text-sm">1 USD = ₦{bankSettings?.nairaRate || 1500}</span></div>
                        <button type="button" onClick={() => copyToClipboard(bankSettings?.accountNumber || '1120927346')} className="btn-animate w-full bg-white hover:bg-gray-100 border border-gray-200 text-gray-700 font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 uppercase tracking-widest mt-3 !text-[10px] shadow-sm"><Copy className="w-3.5 h-3.5" /> Copy Details</button>
                      </div>
                  ) : selectedCustomPayment ? (
                      <div className="bg-gray-50 border border-gray-200 rounded-xl p-5 mb-6 text-xs font-mono tracking-wide space-y-3 shadow-inner">
                        <div className="flex justify-between items-center border-b border-gray-200 pb-2"><span className="text-gray-500">Method</span> <span className="font-bold text-gray-900">{selectedCustomPayment.name}</span></div>
                        <div className="flex justify-between items-center border-b border-gray-200 pb-2 pt-1"><span className="text-gray-500">Details/Wallet</span> <span className="text-gray-900 font-bold text-sm break-all text-right max-w-[60%] allow-select">{selectedCustomPayment.details}</span></div>
                        <div className="flex flex-col pt-1"><span className="text-gray-500 mb-1">Instructions:</span> <span className="text-gray-700 font-medium leading-relaxed">{selectedCustomPayment.instruction}</span></div>
                        <button type="button" onClick={() => copyToClipboard(selectedCustomPayment.details)} className="btn-animate w-full bg-white hover:bg-gray-100 border border-gray-200 text-gray-700 font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 uppercase tracking-widest mt-3 !text-[10px] shadow-sm"><Copy className="w-3.5 h-3.5" /> Copy Data</button>
                      </div>
                  ) : null}

                  {/* Submit Form Box */}
                  <form onSubmit={submitManualDeposit} className="space-y-4 p-5 bg-white rounded-2xl border border-gray-200 shadow-sm mt-4">
                      <p className="text-[10px] font-bold text-brand-primary uppercase tracking-widest mb-3 flex items-center gap-2 border-b border-gray-100 pb-2"><CircleDollarSign className="w-3.5 h-3.5"/> Submit Deposit Request</p>
                      <div className="grid grid-cols-2 gap-4">
                          <div>
                              <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Amount (USD)</label>
                              <div className="relative">
                                 <DollarSign className="w-3.5 h-3.5 text-gray-400 absolute left-3 top-3.5" />
                                 <input type="number" step="0.01" min="1" value={manualAmount} onChange={e => setManualAmount(e.target.value)} required placeholder="10" className="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl pl-9 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-primary/30 focus:border-brand-primary transition-all allow-select font-mono" />
                              </div>
                          </div>
                          <div>
                              <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em] whitespace-nowrap overflow-hidden text-ellipsis">Equivalent</label>
                              <div className="w-full bg-gray-100 border border-gray-200 text-gray-700 text-sm rounded-xl px-4 py-2.5 font-mono flex items-center font-bold">
                                  {manualMethod === 'Local Bank Transfer' && manualAmount ? `₦${(parseFloat(manualAmount) * (bankSettings?.nairaRate || 1500)).toLocaleString()}` : (manualAmount ? `$${manualAmount}` : '0')}
                              </div>
                          </div>
                      </div>
                      <div className="pt-1">
                          <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Transaction ID / Sender Name</label>
                          <input type="text" value={manualTxId} onChange={e => setManualTxId(e.target.value)} required placeholder="Enter TrxID or Phone Number..." className="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-primary/30 focus:border-brand-primary transition-all allow-select font-mono" />
                      </div>
                      <button type="submit" className="btn-animate w-full bg-gray-900 hover:bg-black text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-md tracking-widest uppercase text-[10px] mt-4">
                          Submit Request
                      </button>
                  </form>
                </div>
              </div>
            </div>
          );
        }
// ==========================================

        function CustomerDashboardProfile({ user, balance, tier, userInfo, allOrders, deposits, purchases, tickets, featureSettings, triggerToast }) {
          const [profileSubTab, setProfileSubTab] = useState('overview');
          const [ticketSubject, setTicketSubject] = useState('');
          const [ticketMessage, setTicketMessage] = useState('');

          const claimDailyBonus = async () => {
            const today = new Date().toISOString().split('T')[0];
            if (userInfo?.lastBonusDate === today) { triggerToast('You already claimed your bonus today.'); return; }
            try {
              const token = await getAuthToken();
              const res = await fetch(`${BACKEND_URL}/api/claim-daily-bonus`, {
                  method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
              });
              const data = await res.json();
              triggerToast(data.message);
            } catch(err) { triggerToast('Failed to get bonus.'); }
          };

          const submitTicket = async (e) => {
            e.preventDefault(); if (!ticketSubject.trim() || !ticketMessage.trim()) return;
            try {
              const token = await getAuthToken();
              await fetch(`${BACKEND_URL}/api/secure-action`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                  body: JSON.stringify({ action: 'create_ticket', id: 'TCK-' + Date.now(), subject: ticketSubject, message: ticketMessage })
              });
              setTicketSubject(''); setTicketMessage(''); triggerToast('Ticket sent successfully.');
            } catch(err) {}
          };

          const referralCode = `REF-${(user?.email || '').split('@')[0].toUpperCase()}`;
          
          const myDeposits = (deposits || []).filter(d => d && d.email === user?.email);
          const myOrders = (allOrders || []).filter(o => o && o.customer === user?.email);
          const myPurchases = (purchases || []).filter(p => p && p.customer === user?.email);

        // ==========================================

        function CartModal({ cart, setCart, setShowCart, balance, user, promoSettings, triggerToast, addNotification, bankSettings }) {
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);
            const discountAmount = promoSettings?.isActive ? (totalAmount * (promoSettings.discount / 100)) : 0;
            const finalAmount = totalAmount - discountAmount;

            const handleCheckout = async () => {
                if (balance < finalAmount) { triggerToast("Insufficient balance. Add funds."); return; }
                setIsCheckingOut(true);
                let serverWakeTimer = setTimeout(() => { triggerToast("Please wait..."); }, 4000);
                try {
                    const token = await getAuthToken();
                    const response = await fetch(`${BACKEND_URL}/api/checkout`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ cart: cart })
                    });
                    clearTimeout(serverWakeTimer);
                    if (!response.ok) throw new Error("Network error");
                    const result = await response.json();
                    if (result.success) {
                        triggerToast(`Successfully purchased ${cart.length} item(s).`);
                        addNotification("Purchase Success", `You bought ${cart.length} item(s).`);
                        setCart([]); setShowCart(false);
                    } else triggerToast("Error: " + result.message);
                } catch(e) { clearTimeout(serverWakeTimer); triggerToast("Purchase failed. Try again."); } 
                finally { setIsCheckingOut(false); }
            };

            return createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-[#000]/80 backdrop-blur-sm animate-fade-in-up">
                    <div className="glass-effect shadow-[0_20px_50px_rgba(0,0,0,0.8)] rounded-3xl w-full max-w-md p-6 sm:p-8 border border-white/20 bg-[#0f172a]">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
                            <h3 className="text-sm font-bold tracking-widest text-white flex items-center gap-2 uppercase"><ShoppingCart className="w-4 h-4"/> Your Cart</h3>
                            <button type="button" onClick={() => setShowCart(false)} className="btn-animate p-2 bg-black/50 hover:bg-white/10 rounded-full text-gray-400 border border-white/10"><X className="w-3.5 h-3.5" /></button>
                        </div>
                        {cart.length === 0 ? (
                            <div className="text-center py-16 text-gray-500 flex flex-col items-center">
                                <ShoppingCart className="w-12 h-12 mb-4 opacity-20" strokeWidth={1} />
                                <p className="font-mono text-[10px] uppercase tracking-widest">Cart is empty.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="max-h-60 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-4 bg-black/40 border border-white/10 rounded-2xl group hover:border-white/30 transition-colors animate-fade-in-up" style={{animationDelay: `${idx * 0.05}s`}}>
                                            <div className="flex flex-col">
                                                <span className="text-xs font-bold text-white uppercase tracking-wider">
                                                    {item.name}
                                                </span>
                                                {item.selectedState && item.selectedState !== 'Random' && (
                                                    <span className="text-[9px] text-gray-400 mt-1 font-mono uppercase bg-[#111] w-fit px-2 py-0.5 rounded border border-[#222]">State: {item.selectedState}</span>
                                                )}
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="flex flex-col items-end">
                                                    <span className="text-sm font-mono font-bold text-white">${item.price.toFixed(2)}</span>
                                                    <span className="text-[8px] text-gray-400 font-mono">~ ₦{(item.price * (bankSettings?.nairaRate || 1500)).toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
                                                </div>
                                                <button type="button" onClick={() => setCart(cart.filter((_, i) => i !== idx))} className="btn-animate p-2 bg-red-900/20 text-red-500 hover:bg-red-900/50 rounded-lg border border-red-900/30"><Trash2 className="w-3.5 h-3.5"/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="border-t border-white/10 pt-5 space-y-3">
                                    <div className="flex justify-between text-[10px] text-gray-400 font-mono uppercase tracking-widest"><span>Subtotal:</span><span>${totalAmount.toFixed(2)}</span></div>
                                    {promoSettings?.isActive && discountAmount > 0 && <div className="flex justify-between text-[10px] text-green-400 font-mono uppercase tracking-widest"><span>Discount ({promoSettings.discount}%):</span><span>-${discountAmount.toFixed(2)}</span></div>}
                                    <div className="flex justify-between text-xl font-bold font-mono text-white pt-4 border-t border-white/10">
                                        <span>Total:</span>
                                        <div className="flex flex-col items-end">
                                            <span>${finalAmount.toFixed(2)}</span>
                                            <span className="text-[10px] text-brand-primary font-medium mt-1">~ ₦{(finalAmount * (bankSettings?.nairaRate || 1500)).toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
                                        </div>
                                    </div>
                                </div>
                                <button type="button" onClick={handleCheckout} disabled={isCheckingOut || balance < finalAmount} className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs mt-6">
                                    {isCheckingOut ? 'Processing...' : (balance < finalAmount ? 'Not Enough Balance' : 'Confirm Purchase')}
                                </button>
                            </div>
                        )}
                    </div>
                </div>,
                document.body

        function AiVoiceAssistant({ isLoggedIn, activeTab }) {
            const [isListening, setIsListening] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [showBubble, setShowBubble] = useState(false);
            const [bubbleExiting, setBubbleExiting] = useState(false);
            
            // 🟢 NEW: Memory & Proactive State Variables 🟢
            const [chatHistory, setChatHistory] = useState([]);
            const silenceTimerRef = useRef(null);
            const autoWakeTimerRef = useRef(null);
            const recognitionRef = useRef(null);
            const hasFollowedUpRef = useRef(false); // 🟢 FIX: একবারই প্রশ্ন করার ট্র্যাকার

            // Initial greeting bubble logic
            useEffect(() => {
                const interval = setInterval(() => {
                    if (isLoggedIn && activeTab === 'store' && !isListening && !isSpeaking && !isProcessing && !transcript && chatHistory.length === 0) {
                        setShowBubble(true);
                        setBubbleExiting(false);
                        setTimeout(() => {
                            setBubbleExiting(true);
                            setTimeout(() => setShowBubble(false), 500);
                        }, 4000);
                    }
                }, 15000); // Initial welcome bubble interval
                return () => clearInterval(interval);
            }, [isListening, isSpeaking, isProcessing, transcript, isLoggedIn, activeTab, chatHistory.length]);

            // 🟢 NEW: Proactive Timers Logic (Ask Only Once) 🟢
            const resetProactiveTimers = useCallback(() => {
                if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);
                if (autoWakeTimerRef.current) clearTimeout(autoWakeTimerRef.current);

                // AI কথা শেষ করার ২০ সেকেন্ড পর চেক করবে। যদি আগে জিজ্ঞেস না করে থাকে, তবেই করবে।
                if (!isSpeaking && chatHistory.length > 0 && !isListening && !isProcessing && !hasFollowedUpRef.current) {
                    silenceTimerRef.current = setTimeout(() => {
                        hasFollowedUpRef.current = true; // 👈 মার্ক করে দিলাম যে একবার জিজ্ঞেস করা হয়েছে
                        handleSendToAI("[SYSTEM_SILENCE_TIMEOUT]", true);
                    }, 20000); // 20 Seconds silence timeout
                }

                // যদি ইউজার চুপচাপ বসে থাকে, তবে ৬০ সেকেন্ড পর একবারই নক করবে
                if (!isSpeaking && !isListening && !isProcessing && !hasFollowedUpRef.current) {
                    autoWakeTimerRef.current = setTimeout(() => {
                        hasFollowedUpRef.current = true; // 👈 মার্ক করে দিলাম
                        handleSendToAI("[SYSTEM_AUTO_WAKE]", true);
                    }, 60000); // 60 Seconds auto-wake
                }
            }, [isSpeaking, isListening, isProcessing, chatHistory]);

            useEffect(() => {
                resetProactiveTimers();
                return () => {
                    if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);
                    if (autoWakeTimerRef.current) clearTimeout(autoWakeTimerRef.current);
                };
            }, [resetProactiveTimers]);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = false;

                    recognitionRef.current.onresult = async (event) => {
                        const text = event.results[0][0].transcript;
                        setTranscript(text);
                        hasFollowedUpRef.current = false; // 👈 ইউজার নিজে থেকে কথা বললে ট্র্যাকার আবার ফ্রেশ হয়ে যাবে
                        handleSendToAI(text, false);
                    };

                    recognitionRef.current.onerror = (event) => {
                        console.error('Speech recognition error', event.error);
                        setIsListening(false);
                        setIsProcessing(false);
                        setTranscript('Microphone Error.');
                        setTimeout(() => setTranscript(''), 3000);
                    };

                    recognitionRef.current.onend = () => {
                        setIsListening(false);
                    };
                }
            }, []);

            const toggleListening = () => {
                // User interaction resets timers
                if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);
                if (autoWakeTimerRef.current) clearTimeout(autoWakeTimerRef.current);

                if (isListening || isSpeaking || isProcessing || transcript !== '') {
                    recognitionRef.current?.stop();
                    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                    setIsListening(false);
                    setIsSpeaking(false);
                    setIsProcessing(false);
                    setTranscript(''); 
                } else {
                    // 🟢 iOS/Mobile Hack: ক্লিক করার সাথে সাথেই স্পিচ ইঞ্জিন আনলক করা 🟢
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const unlockUtterance = new SpeechSynthesisUtterance('');
                        unlockUtterance.volume = 0; // সাইলেন্ট
                        window.speechSynthesis.speak(unlockUtterance);
                    }

                    setIsSpeaking(false);
                    setTranscript('Listening...');
                    try {
                        recognitionRef.current?.start();
                        setIsListening(true);
                    } catch(e) {
                        console.log(e);
                    }
                }
            };

            // 🟢 AUTO-CLEAR TRANSCRIPT AFTER 10 SECONDS 🟢
            useEffect(() => {
                let timeout;
                // কথা বলা শেষ হলে লেখাটি ঠিক ১০ সেকেন্ড স্ক্রিনে থাকবে
                if (transcript && !isSpeaking && !isProcessing && !isListening) {
                    timeout = setTimeout(() => setTranscript(''), 10000); // 10000ms = 10 Seconds
                }
                return () => clearTimeout(timeout);
            }, [transcript, isSpeaking, isProcessing, isListening]);

            const handleSendToAI = async (text, isSystemEvent = false) => {
                setIsProcessing(true);
                
                // Only show transcript for user input, not system events
                if (!isSystemEvent) {
                    setChatHistory(prev => [...prev, { role: 'user', content: text }]);
                }

                try {
                    const token = await getAuthToken();
                    const res = await fetch(`${BACKEND_URL}/api/ai-chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ message: text, history: chatHistory })
                    });
                    const data = await res.json();
                    
                    if (data.success && data.reply) {
                        const cleanText = data.reply.replace(/[*#_~`>-]/g, '').replace(/\n/g, ' ').trim();
                        setTranscript(cleanText);
                        speakText(cleanText);
                        
                        // Save AI response to history (keep only last 6 messages to avoid token limit)
                        setChatHistory(prev => {
                            const newHistory = [...prev, { role: 'assistant', content: cleanText }];
                            return newHistory.slice(-6); 
                        });
                    } else {
                        setTranscript("Sorry, couldn't get a response.");
                        speakText("Sorry, I didn't catch that. Please try again.");
                    }
                } catch (err) {
                    setTranscript("Network Error.");
                    speakText("Network issue occurred. Please try again.");
                }
                setIsProcessing(false);
            };

            // 🟢 UPDATED: Better Voice Quality Logic & Symbol Cleanup 🟢
            const speakText = (text) => {
                if (!('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                
                // 🟢 FIX: ব্রাউজার যাতে মাঝপথে কথা থামিয়ে না দেয় (Prevent Garbage Collection) 🟢
                window.speechUtteranceRef = utterance;
                
                const isBengali = /[\u0980-\u09FF]/.test(text);
                const targetLang = isBengali ? 'bn-BD' : 'en-US';
                utterance.lang = targetLang;
                
                // পিচ এবং স্পিড একটু ন্যাচারাল করার চেষ্টা
                utterance.pitch = 1.05; 
                utterance.rate = 0.95; 

                // ডিভাইসের সেরা ভয়েসটি খুঁজে বের করা
                const voices = window.speechSynthesis.getVoices();
                if (voices && voices.length > 0) {
                    let bestVoice = null;
                    
                    bestVoice = voices.find(v => v.lang.includes(isBengali ? 'bn' : 'en') && v.name.includes('Google'));
                    
                    if (!bestVoice) {
                        bestVoice = voices.find(v => v.lang.includes(isBengali ? 'bn' : 'en') && (v.name.includes('Natural') || v.name.includes('Premium')));
                    }
                    
                    if (!bestVoice) {
                        bestVoice = voices.find(v => v.lang.includes(isBengali ? 'bn' : 'en'));
                    }

                    if (bestVoice) {
                        utterance.voice = bestVoice;
                    }
                }
                
                utterance.onstart = () => {
                    setIsSpeaking(true);
                    // Chrome 15-second speech cutoff bug fix
                    window.speechResumeInterval = setInterval(() => {
                        if (window.speechSynthesis.speaking) {
                            window.speechSynthesis.pause();
                            window.speechSynthesis.resume();
                        } else {
                            clearInterval(window.speechResumeInterval);
                        }
                    }, 10000);
                };
                
                utterance.onend = () => {
                    clearInterval(window.speechResumeInterval);
                    setIsSpeaking(false);
                    // টাইমার এখন উপরের ১০ সেকেন্ডের useEffect দ্বারা কন্ট্রোল হবে
                };
                
                utterance.onerror = () => {
                    clearInterval(window.speechResumeInterval);
                    setIsSpeaking(false);
                };
                
                // 🟢 মোবাইল ব্রাউজার ঘুমে থাকলে জাগানোর জন্য Force Resume 🟢
                window.speechSynthesis.resume();
                window.speechSynthesis.speak(utterance);
            };

            // কিছু ব্রাউজারে (যেমন ক্রোম) ভয়েস লোড হতে একটু সময় নেয়, তাই এটি আগে থেকেই কল করে রাখা ভালো
            useEffect(() => {
                if (typeof window !== 'undefined' && window.speechSynthesis) {
                    window.speechSynthesis.getVoices();
                }
            }, []);

            // 🟢 FORCE STOP FIX: স্পিচ ইঞ্জিন থেমে গেলে জোরপূর্বক UI আপডেট করার চেকার 🟢
            useEffect(() => {
                let checkInterval;
                if (isSpeaking) {
                    checkInterval = setInterval(() => {
                        if (!window.speechSynthesis.speaking) {
                            setIsSpeaking(false);
                            // টাইমার এখন উপরের ১০ সেকেন্ডের useEffect দ্বারা কন্ট্রোল হবে
                            clearInterval(checkInterval);
                        }
                    }, 500);
                }
                return () => clearInterval(checkInterval);
            }, [isSpeaking]);

            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) return null;

            return (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[160] flex flex-col items-center gap-3 w-full px-4">
                    
                    {/* Welcome / Instruction Bubble (Light Mode) */}
                    {showBubble && !isListening && !isSpeaking && !isProcessing && !transcript && (
                        <div className={`relative mb-2 origin-bottom transform-gpu ${bubbleExiting ? 'animate-suck-into-button' : 'animate-water-drop'}`}>
                            <div className="bg-white px-4 py-3 rounded-2xl text-[10px] sm:text-xs font-bold tracking-wide text-gray-800 shadow-lg flex items-center justify-center gap-2 border border-gray-200 max-w-[280px] text-center">
                                <Sparkles className="w-4 h-4 text-brand-primary animate-pulse shrink-0" />
                                <span>If you need help, just tap the mic and ask me!</span>
                            </div>
                            <div className="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-3 h-3 bg-white border-r border-b border-gray-200 rotate-45"></div>
                        </div>
                    )}

                    {/* Active Transcript Bubble (Light Mode) */}
                    {transcript && (
                        <div className="bg-white p-4 rounded-2xl text-[10px] sm:text-[11px] font-bold tracking-wide text-gray-800 w-max max-w-[260px] shadow-lg animate-fade-in-up leading-relaxed text-center border border-gray-200">
                            <span className="text-brand-primary mb-1.5 flex items-center justify-center gap-1.5 font-bold uppercase tracking-[0.2em] text-[8px]"><Zap className="w-2.5 h-2.5"/> AI Agent</span>
                            {transcript}
                        </div>
                    )}

                    <button 
                        onClick={toggleListening} 
                        className={`btn-animate w-12 h-12 sm:w-14 sm:h-14 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.8)] flex items-center justify-center transition-all border-2 backdrop-blur-xl ${isListening ? 'bg-red-500/20 border-red-500 text-red-500 animate-pulse shadow-[0_0_30px_rgba(239,68,68,0.5)]' : isSpeaking ? 'bg-brand-primary/20 border-brand-primary text-brand-primary animate-bounce shadow-[0_0_30px_rgba(6,182,212,0.5)]' : 'bg-white/10 border-white/30 text-white hover:bg-white hover:text-black hover:border-white'}`}
                    >
                        {isProcessing ? <RefreshCw className="w-5 h-5 animate-spin"/> : isListening ? <Mic className="w-5 h-5 animate-ping" /> : isSpeaking ? <Volume2 className="w-5 h-5 animate-pulse" /> : <Mic className="w-5 h-5" />}
                    </button>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
