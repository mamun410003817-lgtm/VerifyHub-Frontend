        const VaultItem = ({ acc, idx, triggerToast }) => {
            const [totpCode, setTotpCode] = useState('');
            const [timeLeft, setTimeLeft] = useState(30);
            const [twoFaSecret, setTwoFaSecret] = useState(null);
            
            // 🟢 Renew State 🟢
            const isSMS = acc.type && acc.type.includes('SMS Verify');
            const [isRenewing, setIsRenewing] = useState(false);
            const [renewDuration, setRenewDuration] = useState('3 days');
            const [renewStatus, setRenewStatus] = useState('');

            useEffect(() => {
                try {
                    const rawData = String(acc?.data || '');
                    const match = rawData.match(/🔐 2FA INFO:\s*\n?([a-zA-Z0-9\s]+)/i);
                    if (match && match[1]) setTwoFaSecret(match[1].replace(/\s+/g, '').toUpperCase());
                } catch(e) {}
            }, [acc]);

            useEffect(() => {
                if (!twoFaSecret) return;
                const updateTotp = () => {
                    if (typeof window.OTPAuth !== 'undefined') {
                        try {
                            let totp = new window.OTPAuth.TOTP({ algorithm: 'SHA1', digits: 6, period: 30, secret: window.OTPAuth.Secret.fromBase32(twoFaSecret) });
                            setTotpCode(totp.generate());
                            setTimeLeft(30 - (Math.floor(Date.now() / 1000) % 30));
                        } catch(e) {}
                    }
                };
                updateTotp();
                const interval = setInterval(updateTotp, 1000);
                return () => clearInterval(interval);
            }, [twoFaSecret]);

            const handleRenew = async () => {
                const phoneMatch = String(acc.data || '').match(/📱 Phone:\s*(\d+)/i);
                if(!phoneMatch) {
                    triggerToast('Phone number not found');
                    return;
                }
                const phoneStr = phoneMatch[1];
                setRenewStatus('processing');
                try {
                    const token = await getAuthToken();
                    const res = await fetch(`${BACKEND_URL}/api/sms/renew`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ number: phoneStr, duration: renewDuration })
                    });
                    const data = await res.json();
                    if(data.success) {
                        triggerToast(`Renewed for ${renewDuration}`);
                        setIsRenewing(false);
                    } else {
                        triggerToast(data.message || 'Failed to renew');
                    }
                } catch(e) {
                    triggerToast('Network Error');
                }
                setRenewStatus('');
            };

            if (!acc) return null;

                    </div>

                    {twoFaSecret && (
                        <div className="mb-5 bg-[rgba(0,0,0,0.4)] border border-white/5 p-4 rounded-xl flex flex-col items-center justify-center relative overflow-hidden shadow-inner">
                            <div className="absolute bottom-0 left-0 w-full h-[1px] bg-white/10">
                                <div className="bg-brand-primary h-full transition-all duration-1000 ease-linear shadow-[0_0_10px_rgba(6,182,212,0.8)]" style={{width: `${(timeLeft/30)*100}%`}}></div>
                            </div>
                            <p className="text-[8px] text-gray-400 font-bold mb-1 uppercase tracking-[0.3em]">Auth Code</p>
                            <div className="text-2xl font-bold text-white tracking-[0.2em] font-mono">{totpCode || '------'}</div>
                        </div>
                    )}

                    <div className="w-full bg-[rgba(0,0,0,0.4)] border border-white/5 p-4 rounded-xl mb-5 overflow-x-auto flex-grow shadow-inner custom-scrollbar">
                        <pre className="font-mono text-[11px] text-white font-medium whitespace-pre-wrap break-words leading-relaxed drop-shadow-md">{String(acc.data || '')}</pre>
                    </div>
                    
                    <div className="flex justify-between mt-auto items-center pt-2">
                        <button onClick={async () => {
                           const id = 'REP-' + Date.now();
                           if(acc.customer) {
                               try {
                                   const token = await getAuthToken();
                                   await fetch(`${BACKEND_URL}/api/secure-action`, {
                                       method: 'POST',
                                       headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                       body: JSON.stringify({ action: 'create_ticket', id: id, subject: `Reported Item`, message: `I have an issue with this item: ${acc.type}` })
                                   });

                        <button onClick={() => {

                           else { const t = document.createElement("textarea"); t.value = String(acc.data || ''); document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }

                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

        function LiveChatWidget({ user, setIncomingMsg }) {
            const [isOpen, setIsOpen] = useState(false);
            const [message, setMessage] = useState('');
            const [chatMessages, setChatMessages] = useState([]);
            const [unreadCount, setUnreadCount] = useState(0);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const fetchChat = async () => {
                    const { data } = await supabase.from('store_chats').select('*').eq('user_email', user.email).order('timestamp', { ascending: true });
                    if (data) {
                        const newMsgs = data.map(m => ({ id: m.id, ...m.data, timestamp: m.timestamp }));
                        if(newMsgs.length > chatMessages.length && !isOpen) {
                            const lastMsg = newMsgs[newMsgs.length - 1];
                            if(lastMsg.sender === 'admin') {
                                setIncomingMsg(lastMsg.text);
                                setUnreadCount(prev => prev + 1);
                            }
                        }
                        setChatMessages(newMsgs);
                    }
                };
                fetchChat();
                const intId = setInterval(fetchChat, 4000);
                return () => clearInterval(intId);
            }, [isOpen, user.email, setIncomingMsg, chatMessages.length]);

            useEffect(() => { if (isOpen) { setUnreadCount(0); setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100); } }, [isOpen, chatMessages]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!message.trim()) return;
                const msgText = message;
                setMessage(''); 
                try {
                    const token = await getAuthToken();
                    await fetch(`${BACKEND_URL}/api/secure-action`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ action: 'send_chat', text: msgText })
                    });
                } catch(err) {}
            };

            return (
                <>
                    <button onClick={() => setIsOpen(!isOpen)} className="btn-animate fixed bottom-6 right-6 z-[150] w-14 h-14 bg-white rounded-full shadow-[0_4px_15px_rgba(255,255,255,0.3)] flex items-center justify-center text-black">
                        {isOpen ? <X className="w-6 h-6" /> : <MessageSquare className="w-6 h-6" />}
                        {!isOpen && unreadCount > 0 && (
                            <span className="absolute -top-1 -right-1 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white animate-pulse shadow-lg">
                                {unreadCount}
                            </span>
                        )}
                    </button>
                    {isOpen && (
                        <div className="fixed bottom-24 right-6 z-[150] w-[340px] h-[480px] glass-effect rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.9)] flex flex-col overflow-hidden origin-bottom-right animate-fade-in-up">
                            <div className="bg-[rgba(255,255,255,0.05)] border-b border-white/10 p-5 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                   <div className="w-2.5 h-2.5 bg-brand-primary rounded-full animate-pulse"></div>
                                   <h3 className="text-white font-bold text-[11px] tracking-widest uppercase">Admin Support</h3>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-gray-400 hover:text-white transition-colors"><X className="w-4 h-4"/></button>
                            </div>
                            <div className="flex-grow overflow-y-auto p-5 space-y-4 custom-scrollbar bg-transparent">
                                {chatMessages.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-40">
                                        <Headset className="w-12 h-12 mb-4 text-white" strokeWidth={1.5} />
                                        <p className="text-[10px] text-gray-300 font-mono text-center uppercase tracking-widest">Encrypted Channel Open</p>
                                    </div>
                                ) : (
                                    chatMessages.map((msg, i) => (
                                        <div key={msg.id} className={`flex flex-col animate-swoosh-in ${msg.sender === 'user' ? 'items-end' : 'items-start'}`} style={{animationDelay: `${i * 0.03}s`}}>
                                            <div className={`px-4 py-3 rounded-2xl max-w-[85%] text-[12px] font-medium leading-relaxed shadow-lg allow-select ${msg.sender === 'user' ? 'bg-white text-black rounded-tr-sm' : 'glass-panel text-white rounded-tl-sm'}`}>
                                                {msg.text}
                                            </div>
                                            <span className="text-[8px] text-gray-500 mt-1.5 font-mono tracking-wider">
                                                {msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...'}
                                            </span>
                                        </div>
                                    ))
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                            <form onSubmit={sendMessage} className="bg-[rgba(0,0,0,0.5)] border-t border-white/10 p-4 flex gap-3 items-center">
                                <input type="text" value={message} onChange={e => setMessage(e.target.value)} placeholder="Type a message..." className="glass-input allow-select !py-3"/>
                                <button type="submit" disabled={!message.trim()} className="btn-animate bg-white text-black p-3.5 rounded-xl disabled:opacity-50"><Send className="w-4 h-4" /></button>
                            </form>
                        </div>
                    )}
                </>
            );
        }

        // ==========================================
        // 🌟 ASSET STORE MODULE
        // ==========================================
        function CustomerDashboardStore({ inventory, categories, cart, setCart, triggerToast }) {
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedStates, setSelectedStates] = useState({}); 
          const filteredCategories = categories.filter(c => (c?.name || '').toLowerCase().includes((searchQuery || '').toLowerCase()));

          const handleAddToCart = (product) => {
              const selectedState = selectedStates[product.id];
              if (!selectedState && getAvailableStates(product.id).length > 0) {
                  triggerToast("Please select a State.");
                  return;
              }
              const finalState = (!selectedState || selectedState === 'Random') ? undefined : selectedState;
              const cartItem = { ...product };
              if (finalState) cartItem.selectedState = finalState;
              
              setCart([...cart, cartItem]); 
              triggerToast(`Added to cart.`);
          };

          const handleStateChange = (productId, stateStr) => {
              setSelectedStates(prev => ({...prev, [productId]: stateStr}));
          };

          const getAvailableStates = (productId) => {
              const stock = inventory[productId] || [];
              if (stock.length === 0) return [];
              const states = new Set();
              stock.forEach(accData => {
                  const match = String(accData).match(/📍 STATE:\s*\n?([^\n]+)/i);
                  if (match && match[1]) states.add(match[1].trim());
              });
              return Array.from(states).sort();
          };

          return (
            <div className="space-y-6 w-full relative z-10 animate-matrix-in">
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4 w-full glass-effect p-5 rounded-3xl border border-white/10 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-1.5 h-full bg-brand-primary"></div>
                <div className="text-center sm:text-left w-full pl-4 py-1">
                  <h1 className="text-xl sm:text-2xl font-bold text-white tracking-[0.25em] uppercase mb-1">Buy <span className="font-light text-brand-primary">Accounts</span></h1>
                  <p className="text-gray-400 text-[9px] sm:text-[10px] font-mono tracking-widest uppercase">Verified Static Entities</p>
                </div>
                <div className="w-full sm:w-72 relative">
                     <Search className="w-4 h-4 text-white absolute left-4 top-3.5" />
                     <input type="text" placeholder="Search accounts..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="glass-input allow-select !pl-12 !py-3 rounded-2xl bg-[rgba(0,0,0,0.5)]" />
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 w-full">
                  {filteredCategories.map((product, idx) => {
                      const Icon = product.icon || Package;
                      const availableStates = getAvailableStates(product.id);
                      const stockCount = inventory[product.id] ? inventory[product.id].length : 0;
                      const isOutOfStock = stockCount === 0;

                      return (
                          <div key={product.id} className={`relative glass-panel rounded-3xl p-6 flex flex-col group transition-all duration-300 border border-white/5 animate-spring-card ${isOutOfStock ? "opacity-50 grayscale" : "hover:border-brand-primary/40 hover:bg-[rgba(255,255,255,0.02)] hover:-translate-y-1 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)]"}`} style={{animationDelay: `${idx * 0.05}s`, animationFillMode: 'both'}}>
                              
                              <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-brand-primary to-transparent scale-x-0 group-hover:scale-x-100 transition-transform duration-700 ease-out"></div>

                              {isOutOfStock && (
                                  <div className="absolute inset-0 z-20 flex items-center justify-center bg-[#000]/80 rounded-3xl pointer-events-none">
                                      <div className="bg-white/10 text-white font-bold px-4 py-2 rounded-xl border border-white/20 tracking-[0.3em] text-[10px] uppercase transform -rotate-12">
                                          Out of Stock
                                      </div>
                                  </div>
                              )}

                              <div className="flex justify-between items-start mb-6 relative z-10">
                                  <div className="bg-white/5 p-4 rounded-2xl border border-white/10 group-hover:bg-brand-primary/10 transition-colors duration-500">
                                      <Icon className={`w-6 h-6 text-brand-primary`} strokeWidth={1.5} />
                                  </div>
                                  <div className="text-right flex flex-col items-end">
                                      <span className="text-white text-xl font-mono font-bold tracking-wider">${Number(product.price).toFixed(2)}</span>
                                      <span className="text-[8px] text-brand-primary uppercase tracking-widest mt-1 font-mono bg-brand-primary/10 px-2.5 py-1 rounded-full border border-brand-primary/20">{stockCount} Units</span>
                                  </div>
                              </div>
                              
                              <h3 className="text-sm font-bold text-white mb-2 tracking-wider uppercase relative z-10 group-hover:text-brand-primary transition-colors duration-300">{product.name}</h3>
                              <p className="text-gray-400 text-[10px] leading-relaxed mb-6 flex-grow line-clamp-2 font-light relative z-10">{product.description}</p>
                              
                              {!isOutOfStock && availableStates.length > 0 && (
                                  <div className="mb-5 relative z-10">
                                      <select 
                                          value={selectedStates[product.id] || ''} 
                                          onChange={(e) => handleStateChange(product.id, e.target.value)}
                                          className="w-full bg-[rgba(0,0,0,0.5)] border border-white/10 text-gray-300 text-[10px] rounded-xl px-4 py-3.5 appearance-none outline-none focus:border-brand-primary/50 tracking-wider font-mono cursor-pointer transition-colors allow-select"
                                      >
                                          <option value="">Select State</option>
                                          <option value="Random">Random State</option>
                                          {availableStates.map(state => <option key={state} value={state}>{state}</option>)}
                                      </select>
                                      <ChevronDown className="w-3 h-3 text-gray-400 absolute right-4 top-3.5 pointer-events-none"/>
                                  </div>
                              )}

                              <button onClick={() => handleAddToCart(product)} disabled={isOutOfStock} className="btn-animate w-full bg-white/5 border border-white/10 hover:bg-brand-primary text-white hover:text-black font-bold py-4 rounded-xl text-[10px] tracking-widest uppercase relative z-10 flex justify-center items-center gap-2">
                                  {isOutOfStock ? 'Unavailable' : 'Add to Cart'} <ShoppingCart className="w-3.5 h-3.5" />
                              </button>
                          </div>
                      );
                  })}
                  {filteredCategories.length === 0 && <div className="col-span-full py-16 text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest"><Search className="w-8 h-8 mx-auto mb-3 opacity-20"/>No accounts found.</div>}
              </div>
            </div>
          );
        }

        // ==========================================
        // FUNDS MODULE
        // ==========================================
        function CustomerDashboardFunds({ user, triggerToast, addNotification, bankSettings, cryptoSettings, customPayments, deposits, setDeposits }) {
          const [hiddenInvoices, setHiddenInvoices] = useState(() => {
              try {
                  const stored = localStorage.getItem(`hiddenInvoices_${user?.email}`);
                  return stored ? JSON.parse(stored) : [];
              } catch(e) { return []; }
          });
          
          const [isGenerating, setIsGenerating] = useState(false); 
          const [isVerifyingClick, setIsVerifyingClick] = useState(false); 
          const [cryptoAmountInput, setCryptoAmountInput] = useState(''); 

          const [manualAmount, setManualAmount] = useState('');
          const [manualMethod, setManualMethod] = useState('Local Bank Transfer');
          const [manualTxId, setManualTxId] = useState('');

          useEffect(() => {
              if(user?.email) {
                  localStorage.setItem(`hiddenInvoices_${user.email}`, JSON.stringify(hiddenInvoices));
              }
          }, [hiddenInvoices, user]);

          const pendingCrypto = (deposits || []).find(d => {
              if (!d || d.email !== user?.email) return false;
              if (hiddenInvoices.includes(d.id)) return false; 

              const status = d.data?.status || d.status;
              const method = d.data?.method || d.method;

              if (status !== 'Awaiting Payment' && status !== 'Pending Review') return false;
              if (!String(method).includes('NOWPayments')) return false; 
              
              return true;
          });

          const isNowPayments = pendingCrypto && String(pendingCrypto.data?.method || pendingCrypto.method).includes('NOWPayments');

          const startAutoDeposit = async (e) => {
              e.preventDefault();
              if (isGenerating) return; 
              const baseAmount = parseFloat(cryptoAmountInput);
              if (isNaN(baseAmount) || baseAmount < 1) { triggerToast('Minimum deposit is $1.00'); return; }
              
              setIsGenerating(true); 
              
              try {
                  const token = await getAuthToken();
                  const response = await fetch(`${BACKEND_URL}/api/nowpayments/create-invoice`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ amount: baseAmount })
                  });
                  
                  const result = await response.json();
                  
                  if(result.success && result.url) {
                      window.open(result.url, '_blank'); 
                      triggerToast("Invoice created. Redirecting to payment page...");
                      setCryptoAmountInput('');
                  } else {
                      triggerToast(result.message || "Failed to generate invoice.");
                  }
              } catch (err) { 
                  triggerToast("Request failed."); 
              }
              setIsGenerating(false);
          };

          const handleNowPaymentsVerify = async (e) => {
              if(e) e.preventDefault();
              if (!pendingCrypto) return;
              setIsVerifyingClick(true);
              try {
                  const token = await getAuthToken();
                  const response = await fetch(`${BACKEND_URL}/api/nowpayments/verify`, {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ invoiceId: pendingCrypto.id })
                  });
                  const result = await response.json();
                  if (result.success) {
                      triggerToast(result.message || `Payment Verified!`);
                      addNotification('Deposit Successful', `Balance updated.`);
                      
                      // 🟢 UPDATE UI IMMEDIATELY 🟢
                      setDeposits(prev => prev.map(d => d.id === pendingCrypto.id ? { ...d, status: 'Approved', data: {...(d.data || {}), status: 'Approved'} } : d));
                      setHiddenInvoices(prev => [...prev, pendingCrypto.id]); // Hide invoice
                      
                  } else {
                      triggerToast(result.message || 'Payment not completed yet. Try again later.');
                  }
              } catch (err) {
                  triggerToast('Network error while checking.');
              } finally {
                  setIsVerifyingClick(false);
              }
          };

          const cancelAutoPay = (e) => {
              if(e) e.preventDefault(); 
              if (pendingCrypto && pendingCrypto.id) {
                  const newArr = [...hiddenInvoices, pendingCrypto.id];
                  setHiddenInvoices(newArr);
                  localStorage.setItem(`hiddenInvoices_${user?.email}`, JSON.stringify(newArr));
                  triggerToast('Invoice cancelled successfully.');
              }
          };

          const submitManualDeposit = async (e) => {
              e.preventDefault();
              const amt = parseFloat(manualAmount);
              if (isNaN(amt) || amt < 1) return triggerToast("Minimum deposit is $1");
              if (!manualTxId.trim()) return triggerToast("Please provide Transaction ID/Sender Details");
              
              const newInvoiceId = 'DEP-MANUAL-' + Date.now();
              try {
                  const token = await getAuthToken();
                  await fetch(`${BACKEND_URL}/api/secure-action`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ action: 'create_deposit', id: newInvoiceId, amount: amt, method: manualMethod, txId: manualTxId })
                  });
                  triggerToast(`Deposit request sent! Admin will review shortly.`);
                  setManualAmount('');
                  setManualTxId('');
                  
                  // Optimistic UI Update
                  setDeposits(prev => [{ id: newInvoiceId, email: user.email, date: new Date().toISOString(), status: 'Pending Review', amount: amt, method: manualMethod, data: { amount: amt, method: manualMethod, status: 'Pending Review', txId: manualTxId, date: new Date().toISOString() } }, ...prev]);
              } catch(e) {
                  triggerToast("Failed to submit request.");
              }
          }

          const copyToClipboard = (text) => {
             if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => triggerToast("Copied!"));
             else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
          };

          const selectedCustomPayment = (customPayments || []).find(p => p.name === manualMethod);

          return (
            <div className="animate-matrix-in grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
              <div className="space-y-6 sm:space-y-8 w-full">
                <div className="glass-effect rounded-3xl p-6 sm:p-8 h-fit border border-white/10">
                  <h2 className="text-sm font-bold tracking-widest mb-6 text-white flex items-center gap-2 uppercase">
                     <Zap className="w-4 h-4"/> Auto Crypto Deposit (NOWPayments)
                  </h2>
                  
                  {!pendingCrypto ? (
                      <div className="mt-4">
                        <form onSubmit={startAutoDeposit} className="space-y-5 w-full">
                          <div>
                            <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Amount (USD)</label>
                            <div className="relative">
                               <DollarSign className="w-4 h-4 text-white absolute left-4 top-3.5" />
                               <input type="number" step="1" min="1" name="amount" value={cryptoAmountInput} onChange={e => setCryptoAmountInput(e.target.value)} required placeholder="10" className="glass-input allow-select pl-11 text-sm font-mono" />
                            </div>
                          </div>
                          <button type="submit" disabled={isGenerating} className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs h-12 mt-2 disabled:opacity-50">
                              {isGenerating ? <RefreshCw className="w-4 h-4 animate-spin"/> : <DollarSign className="w-4 h-4"/>}
                              {isGenerating ? 'Processing...' : 'Pay with Crypto'}
                          </button>
                        </form>
                      </div>
                  ) : (
                      isNowPayments && (
                          <div className="bg-[rgba(0,0,0,0.5)] border border-white/10 rounded-2xl p-6 text-center space-y-6 relative overflow-hidden mt-6 animate-fade-in-up">
                              <p className="text-[10px] font-bold text-white flex items-center justify-center gap-2 pt-4 uppercase tracking-[0.3em]">
                                  <span className="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span> Invoice Active
                              </p>
                              
                              <div className="text-3xl sm:text-4xl font-light font-mono text-white tracking-widest allow-select">
                                  ${pendingCrypto.data?.amount || pendingCrypto.amount}
                              </div>
                              <p className="text-xs text-gray-400 font-mono mt-2">Complete your payment in the NOWPayments tab.</p>

            try {
              const token = await getAuthToken();

                            return (

                              </div>
                              <button type="submit" className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs">Send Message</button>
                            </form>
                          </div>

                      <div className="glass-effect rounded-3xl p-6 sm:p-8 flex flex-col w-full border border-white/10">

        // ==========================================
        // CART MODAL
        // ==========================================
        function CartModal({ cart, setCart, setShowCart, balance, user, promoSettings, triggerToast, addNotification }) {
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);
            const discountAmount = promoSettings?.isActive ? (totalAmount * (promoSettings.discount / 100)) : 0;
            const finalAmount = totalAmount - discountAmount;

            const handleCheckout = async () => {
                if (balance < finalAmount) { triggerToast("Insufficient balance. Add funds."); return; }
                setIsCheckingOut(true);
                let serverWakeTimer = setTimeout(() => { triggerToast("Please wait..."); }, 4000);
                try {
                    const token = await getAuthToken();
                    const response = await fetch(`${BACKEND_URL}/api/checkout`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ cart: cart })
                    });
                    clearTimeout(serverWakeTimer);
                    if (!response.ok) throw new Error("Network error");
                    const result = await response.json();
                    if (result.success) {
                        triggerToast(`Successfully purchased ${cart.length} item(s).`);
                        addNotification("Purchase Success", `You bought ${cart.length} item(s).`);
                        setCart([]); setShowCart(false);
                    } else triggerToast("Error: " + result.message);
                } catch(e) { clearTimeout(serverWakeTimer); triggerToast("Purchase failed. Try again."); } 
                finally { setIsCheckingOut(false); }
            };

            return createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-[#000]/80 backdrop-blur-sm animate-fade-in-up">
                    <div className="glass-effect shadow-[0_20px_50px_rgba(0,0,0,0.8)] rounded-3xl w-full max-w-md p-6 sm:p-8 border border-white/20 bg-[#0f172a]">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
                            <h3 className="text-sm font-bold tracking-widest text-white flex items-center gap-2 uppercase"><ShoppingCart className="w-4 h-4"/> Your Cart</h3>
                            <button type="button" onClick={() => setShowCart(false)} className="btn-animate p-2 bg-black/50 hover:bg-white/10 rounded-full text-gray-400 border border-white/10"><X className="w-3.5 h-3.5" /></button>
                        </div>
                        {cart.length === 0 ? (
                            <div className="text-center py-16 text-gray-500 flex flex-col items-center">
                                <ShoppingCart className="w-12 h-12 mb-4 opacity-20" strokeWidth={1} />
                                <p className="font-mono text-[10px] uppercase tracking-widest">Cart is empty.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="max-h-60 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-4 bg-black/40 border border-white/10 rounded-2xl group hover:border-white/30 transition-colors animate-fade-in-up" style={{animationDelay: `${idx * 0.05}s`}}>
                                            <div className="flex flex-col">
                                                <span className="text-xs font-bold text-white uppercase tracking-wider">
                                                    {item.name}
                                                </span>
                                                {item.selectedState && item.selectedState !== 'Random' && (
                                                    <span className="text-[9px] text-gray-400 mt-1 font-mono uppercase bg-[#111] w-fit px-2 py-0.5 rounded border border-[#222]">State: {item.selectedState}</span>
                                                )}
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className="text-sm font-mono font-bold text-white">${item.price.toFixed(2)}</span>
                                                <button type="button" onClick={() => setCart(cart.filter((_, i) => i !== idx))} className="btn-animate p-2 bg-red-900/20 text-red-500 hover:bg-red-900/50 rounded-lg border border-red-900/30"><Trash2 className="w-3.5 h-3.5"/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="border-t border-white/10 pt-5 space-y-3">
                                    <div className="flex justify-between text-[10px] text-gray-400 font-mono uppercase tracking-widest"><span>Subtotal:</span><span>${totalAmount.toFixed(2)}</span></div>
                                    {promoSettings?.isActive && discountAmount > 0 && <div className="flex justify-between text-[10px] text-green-400 font-mono uppercase tracking-widest"><span>Discount ({promoSettings.discount}%):</span><span>-${discountAmount.toFixed(2)}</span></div>}
                                    <div className="flex justify-between text-xl font-bold font-mono text-white pt-4 border-t border-white/10"><span>Total:</span><span>${finalAmount.toFixed(2)}</span></div>
                                </div>
                                <button type="button" onClick={handleCheckout} disabled={isCheckingOut || balance < finalAmount} className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs mt-6">
                                    {isCheckingOut ? 'Processing...' : (balance < finalAmount ? 'Not Enough Balance' : 'Confirm Purchase')}
                                </button>
                            </div>
                        )}
                    </div>
                </div>,
                document.body
            );
        }

        // ==========================================

        function AdminDashboard({ inventory, setInventory, orders, deposits, setDeposits, categories, usersDB, setUsersDB, purchases, tickets, triggerToast, promoSettings, globalNotice, featureSettings, bankSettings, cryptoSettings, customPayments, activeChats, activeTab, maintenanceSettings, isInitialSyncDone, smsSettings, setSmsSettings }) {

          const handleAddProduct = async (e) => {

                  const token = await getAuthToken();

                      body: JSON.stringify({ settingsData: { id: 'Products', data: { list: updatedCategories } } })

          const handleRemoveProduct = async (productId) => {

                  });

                  });

          const handleAddCrypto = async (e) => {
              if(e && e.preventDefault) e.preventDefault();
              if (!newCryptoInput.name || !newCryptoInput.address) return triggerToast("Fill required crypto fields.");
              
              const networkVal = newCryptoInput.network || ""; 
              const newItem = { id: Date.now(), name: newCryptoInput.name, network: networkVal, address: newCryptoInput.address };
              const updatedList = [...(cryptoMethodsList || []), newItem];
              
              try {
                  const token = await getAuthToken();
                  await fetch(`${BACKEND_URL}/api/admin/save-settings`, {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ settingsData: { id: 'CryptoMethods', data: { list: updatedList } } })
                  });
                  triggerToast('Crypto Method Added.');
                  setNewCryptoInput({ name: '', network: '', address: '' }); 
              } catch (e) { triggerToast('Error adding crypto.'); }
          };

          const handleRemoveCrypto = async (id) => {
              const updatedList = (cryptoMethodsList || []).filter(p => p.id !== id);
              try {
                  const token = await getAuthToken();
                  await fetch(`${BACKEND_URL}/api/admin/save-settings`, {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ settingsData: { id: 'CryptoMethods', data: { list: updatedList } } })
                  });
                  triggerToast('Crypto Method Removed.');
              } catch (e) { triggerToast('Error removing crypto.'); }
          };

          // 🟢 FIX: USE SECURE-ACTION BACKEND ROUTE INSTEAD OF DIRECT SUPABASE CALL 🟢
          const handleDeleteAccount = async (categoryId, accountIndex) => {
            if (!window.confirm("Delete this account?")) return;
            try {
              const newInv = { ...inventory };
              newInv[categoryId].splice(accountIndex, 1);
              
              const token = await getAuthToken();
              const res = await fetch(`${BACKEND_URL}/api/secure-action`, {

                      await fetch(`${BACKEND_URL}/api/secure-action`, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },

                      }).catch(()=>{});

                  await fetch(`${BACKEND_URL}/api/secure-action`, {

                      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },

          const totalSales = (orders || []).filter(o => o && (o.status === 'Completed' || o.data?.status === 'Completed')).reduce((sum, order) => sum + Number(order.total || order.data?.total || 0), 0);
          const filteredUsers = Object.keys(usersDB).filter(email => email.toLowerCase().includes(customerSearch.toLowerCase()));

          // 🟢 FIX: USE SECURE-ACTION BACKEND ROUTE INSTEAD OF DIRECT SUPABASE CALL 🟢
          const handleUploadAccounts = async (e) => {
            e.preventDefault(); if (!uploadText.trim()) return;
            const rawText = uploadText.trim(); let validAccounts = [];
            
            if (uploadCategory === 'textplus' || rawText.includes('Email\n') || rawText.includes('Email\r\n')) {
                validAccounts = rawText.split(/(?=^Email\s*\n)/gm).filter(b => b.trim().length > 5).map(b => b.trim());
            } else if (rawText.includes('💌 EMAIL:')) {
                validAccounts = rawText.split(/(?=💌 EMAIL:)/g).filter(b => b.trim().length > 5).map(b => b.trim());
            } else {
                validAccounts = rawText.split(/\n\s*\n/).map(a => a.trim()).filter(a => a.length > 5);
                if(validAccounts.length === 0) validAccounts = rawText.split(/\n/).map(a => a.trim()).filter(a => a.length > 5);
            }

                  triggerToast("Failed: " + result.message);

          };

          return (
            <>
              {editUserModal.show && createPortal(

                            <p className="text-gray-400 text-[10px] font-bold mb-3 uppercase tracking-[0.3em]">Total Users</p>
                            <h3 className="text-3xl sm:text-4xl font-light font-mono text-white">{Object.keys(usersDB).length}</h3>
                          </div>
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 border border-white/10 animate-fade-in-up" style={{animationDelay: '0.3s'}}>
                            <p className="text-gray-400 text-[10px] font-bold mb-3 uppercase tracking-[0.3em]">Total Orders</p>
                            <h3 className="text-3xl sm:text-4xl font-light font-mono text-white">{orders.length}</h3>
                          </div>
                        </div>
                    </div>

                    {/* 🟢 NEW SECTION: ALL CUSTOMER PURCHASES DETAILS 🟢 */}
                    <div className="glass-effect rounded-3xl w-full border border-white/10 overflow-hidden animate-fade-in-up" style={{animationDelay: '0.4s'}}>
                        <div className="p-5 sm:p-6 border-b border-white/10 bg-[rgba(0,0,0,0.5)]">
                          <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">All Customer Purchases</h2>
                          <p className="text-[10px] text-gray-400 font-mono mt-1 uppercase tracking-widest">Accounts, SMS, Phone Numbers & Details</p>
                        </div>
                        <div className="w-full overflow-x-auto bg-transparent">
                          <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-[#000] text-gray-500 font-bold border-b border-white/5 text-[10px] uppercase tracking-[0.2em]">
                              <tr>
                                  <th className="p-4 sm:p-5">Date</th>
                                  <th className="p-4 sm:p-5">Customer Email</th>
                                  <th className="p-4 sm:p-5">Purchase Type</th>
                                  <th className="p-4 sm:p-5">Item Details (Credentials / Phone)</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-white/5">
                              {purchases.map((p, idx) => (
                                <tr key={p.id || idx} className="hover:bg-[rgba(255,255,255,0.05)] transition-colors animate-fade-in-up" style={{animationDelay: `${(idx % 10) * 0.05}s`}}>
                                  <td className="p-4 sm:p-5 align-top">
                                      <p className="text-[10px] text-gray-400 font-mono uppercase tracking-widest mt-1">{safeFormatDate(p.data?.date || p.date)}</p>
                                  </td>
                                  <td className="p-4 sm:p-5 align-top">
                                      <p className="text-xs font-bold text-white tracking-wide mt-1 allow-select">{p.customer}</p>
                                  </td>
                                  <td className="p-4 sm:p-5 align-top">
                                      <span className="bg-brand-primary/10 text-brand-primary border border-brand-primary/20 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest inline-block mt-0.5">{p.type}</span>
                                  </td>
                                  <td className="p-4 sm:p-5">
                                      <div className="bg-[rgba(0,0,0,0.4)] border border-white/5 p-3 rounded-xl min-w-[250px] max-w-sm max-h-32 overflow-y-auto custom-scrollbar shadow-inner">
                                          <pre className="text-[11px] font-mono text-white font-medium whitespace-pre-wrap break-words allow-select">{p.data?.data || p.data}</pre>
                                      </div>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                          {(!purchases || purchases.length === 0) && <p className="text-center py-16 text-gray-600 font-mono text-[10px] uppercase tracking-widest">No purchases yet.</p>}
                        </div>
                    </div>
                  </div>
                )}

                {activeTab === 'deposits' && (
                  <div className="glass-effect rounded-3xl w-full border border-white/10 overflow-hidden">
                    <div className="p-5 sm:p-6 border-b border-white/10 flex items-center justify-between bg-[rgba(0,0,0,0.5)]">
                      <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Deposits</h2>
                      {pendingDeposits.length > 0 && <span className="bg-white text-black px-3 py-1.5 rounded text-[9px] uppercase tracking-widest font-bold animate-pulse">{pendingDeposits.length} Pending</span>}
                    </div>
                    <div className="overflow-x-auto w-full bg-transparent">
                      <table className="w-full text-left whitespace-nowrap text-sm">
                        <thead className="bg-[#000] text-gray-500 font-bold border-b border-white/5 text-[10px] uppercase tracking-[0.2em]">
                          <tr><th className="p-4 sm:p-5">TxID / Date</th><th className="p-4 sm:p-5">User / Method</th><th className="p-4 sm:p-5">Amount</th><th className="p-4 sm:p-5 text-right">Status</th></tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                          {deposits.map((dep, idx) => {
                            const isPending = String(dep.data?.status || dep.status || '').includes('Pending') || String(dep.data?.status || dep.status || '').includes('Awaiting');
                            return (
                              <tr key={dep.id} className="hover:bg-[rgba(255,255,255,0.05)] transition-colors animate-fade-in-up" style={{animationDelay: `${idx * 0.05}s`}}>
                                <td className="p-4 sm:p-5">
                                  <p className="font-mono text-white font-bold text-[10px] truncate max-w-[120px] allow-select">{String(dep.data?.txId || dep.id || '')}</p>
                                  <p className="text-[9px] text-gray-500 mt-1.5 font-mono uppercase tracking-widest">{safeFormatDate(dep.data?.date || dep.date)}</p>
                                </td>
                                <td className="p-4 sm:p-5">
                                  <p className="text-gray-200 font-medium text-xs allow-select">{String(dep.email || '')}</p>
                                  <p className="text-[9px] text-gray-500 mt-1.5 font-mono uppercase tracking-widest">{String(dep.data?.method || dep.method || '')}</p>
                                </td>
                                <td className="p-4 sm:p-5 font-mono font-bold text-white">${Number(dep.data?.amount || dep.amount || 0).toFixed(2)}</td>
                                <td className="p-4 sm:p-5 text-right">
                                  <div className="flex flex-col items-end gap-2">
                                    <span className={`text-[9px] uppercase tracking-[0.2em] font-bold ${(dep.data?.status || dep.status) === 'Approved' ? 'text-green-500' : isPending ? 'text-white' : 'text-red-500'}`}>{String(dep.data?.status || dep.status || '')}</span>
                                    {isPending && (
                                        <button type="button" onClick={() => handleManualApprove(dep.id)} className="btn-animate bg-white text-black border border-white px-3 py-1.5 rounded text-[9px] uppercase tracking-widest font-bold transition-all mt-1">
                                            Approve
                                        </button>
                                    )}
                                  </div>
                                </td>
                              </tr>
                            )
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
                    <div className="glass-effect rounded-3xl p-6 sm:p-8 w-full border border-white/10 animate-fade-in-up">
                      <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white mb-6 border-b border-white/10 pb-4">Payment & Gateway Settings</h2>
                      
                      <form onSubmit={handleSaveSettings} className="space-y-8">
                        <div className="space-y-5">
                           <div className="flex justify-between items-center">
                               <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center gap-2"><DollarSign className="w-3.5 h-3.5"/> Crypto Options</h3>
                           </div>
                           
                           <div className="bg-[#0f172a] border border-white/5 rounded-2xl p-5 shadow-inner">
                               <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-3">Add New Crypto Network</p>
                               <div className="grid grid-cols-2 gap-3 mb-3">
                                   <input type="text" placeholder="Name (e.g. USDT)" value={newCryptoInput.name} onChange={e=>setNewCryptoInput({...newCryptoInput, name: e.target.value})} className="glass-input text-xs allow-select" />
                                   <input type="text" placeholder="Network (Optional)" value={newCryptoInput.network} onChange={e=>setNewCryptoInput({...newCryptoInput, network: e.target.value})} className="glass-input text-xs allow-select" />
                               </div>
                               <input type="text" placeholder="Wallet Address" value={newCryptoInput.address} onChange={e=>setNewCryptoInput({...newCryptoInput, address: e.target.value})} className="glass-input text-xs font-mono mb-3 allow-select" />
                               <button onClick={handleAddCrypto} type="button" className="btn-animate w-full bg-white/10 hover:bg-brand-primary text-white font-bold py-2.5 rounded-xl text-[10px] uppercase tracking-widest">Add Crypto</button>
                           </div>
                           
                           {(!cryptoSettings || cryptoSettings.length === 0) ? (
                               <p className="text-xs text-gray-500 font-mono">No crypto methods added.</p>
                           ) : (
                               cryptoSettings.map((c, i) => (
                                   <div key={i} className="bg-[rgba(0,0,0,0.5)] border border-white/5 p-3 rounded-xl flex justify-between items-center animate-fade-in-up" style={{animationDelay: `${i * 0.05}s`}}>
                                       <div className="max-w-[80%]">
                                           <p className="text-[10px] font-bold text-white uppercase">{c.name} <span className="text-[8px] text-brand-primary">({c.network || 'ANY'})</span></p>
                                           <p className="text-[9px] text-gray-400 font-mono mt-1 break-all allow-select">{c.address}</p>
                                       </div>
                                       <button type="button" onClick={() => handleRemoveCrypto(c.id)} className="btn-animate p-2 bg-red-900/20 text-red-500 hover:bg-red-900/50 rounded-lg"><Trash2 className="w-3.5 h-3.5"/></button>
                                   </div>
                               ))
                           )}
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center gap-2"><Building className="w-3.5 h-3.5"/> Local Bank Details</h3>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Bank Name</label>
                             <input type="text" value={bankNameInput} onChange={(e) => setBankNameInput(e.target.value)} required className={`${uiInput} allow-select`} />
                           </div>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Account Name</label>
                             <input type="text" value={bankAccountNameInput} onChange={(e) => setBankAccountNameInput(e.target.value)} required className={`${uiInput} allow-select`} />
                           </div>
                           <div className="grid grid-cols-2 gap-4">
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Account Number</label>
                                 <input type="text" value={bankAccountNumberInput} onChange={(e) => setBankAccountNumberInput(e.target.value)} required className={`${uiInput} allow-select font-mono`} />
                               </div>
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">1 USD to NGN Rate</label>
                                 <input type="number" step="0.01" value={nairaRateInput} onChange={(e) => setNairaRateInput(e.target.value)} required className={`${uiInput} allow-select`} />
                               </div>
                           </div>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Flutterwave (Card Payment)</h3>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={flutterwaveActiveInput} onChange={(e) => setFlutterwaveActiveInput(e.target.checked)} className="w-4 h-4 rounded text-brand-primary focus:ring-brand-primary bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Flutterwave Gateway</span>
                           </label>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Flutterwave Public Key</label>
                             <input type="text" value={flutterwaveKeyInput} onChange={(e) => setFlutterwaveKeyInput(e.target.value)} placeholder="FLWPUBK_TEST-..." className={`${uiInput} allow-select font-mono`} />
                           </div>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Promotions & Features</h3>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Promo Code</label>
                                 <input type="text" value={promoInput} onChange={(e) => setPromoInput(e.target.value)} placeholder="DISCOUNT20" className={`${uiInput} allow-select uppercase`} />
                               </div>
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Discount (%)</label>
                                 <input type="number" value={discountInput} onChange={(e) => setDiscountInput(e.target.value)} placeholder="10" className={`${uiInput} allow-select`} />
                               </div>
                           </div>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={promoActive} onChange={(e) => setPromoActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Promo Code</span>
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={dailyRewardActive} onChange={(e) => setDailyRewardActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Daily Reward</span>
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={referralActive} onChange={(e) => setReferralActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Referral System</span>
                           </label>
                        </div>
                        
                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Global Notice</h3>
                           <div>
                             <textarea value={noticeInput} onChange={(e) => setNoticeInput(e.target.value)} placeholder="Write a notice for all users..." rows="3" className={`${uiInput} allow-select resize-none`} />
                           </div>
                        </div>

                        {/* 🟢 SMS PRICING SETTINGS 🟢 */}
                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center gap-2"><Smartphone className="w-3.5 h-3.5"/> SMS Verification API</h3>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-brand-primary/50">
                             <input type="checkbox" checked={smsActiveInput} onChange={(e) => setSmsActiveInput(e.target.checked)} className="w-4 h-4 rounded text-brand-primary focus:ring-brand-primary bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable SMS Service</span>
                           </label>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Your Profit Markup ($)</label>
                             <input type="number" step="0.01" value={smsMarkupInput} onChange={(e) => setSmsMarkupInput(e.target.value)} placeholder="1.00" className={`${uiInput} allow-select`} />
                             <p className="text-[8px] text-gray-500 mt-1 uppercase tracking-widest">Added to base cost.</p>
                           </div>
                        </div>

                        {/* 🟢 MAINTENANCE MODE SETTINGS 🟢 */}
                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-red-500 uppercase tracking-[0.3em] flex items-center gap-2"><Settings className="w-3.5 h-3.5"/> Maintenance Mode</h3>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-red-500/50">
                             <input type="checkbox" checked={maintenanceActiveInput} onChange={(e) => setMaintenanceActiveInput(e.target.checked)} className="w-4 h-4 rounded text-red-500 focus:ring-red-500 bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Maintenance Mode</span>
                           </label>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Maintenance Message</label>
                             <textarea value={maintenanceMessageInput} onChange={(e) => setMaintenanceMessageInput(e.target.value)} placeholder="We are currently upgrading our systems. Please check back later." rows="2" className={`${uiInput} allow-select resize-none`} />
                           </div>
                        </div>

                        <div className="pt-6 border-t border-white/10"><button type="submit" className={uiBtnPrimary}>Save All Settings</button></div>
                      </form>
                    </div>

                    <div className="space-y-6 sm:space-y-8 w-full">
                        <div className="glass-effect rounded-3xl p-6 sm:p-8 w-full border border-white/10 h-fit animate-fade-in-up" style={{animationDelay: '0.1s'}}>
                          <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                             <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Custom Payment Methods</h2>
                          </div>
                          
                          <form onSubmit={handleAddCustomPayment} className="space-y-4 mb-8 bg-[rgba(0,0,0,0.5)] p-5 rounded-2xl border border-white/5 shadow-inner">
                              <p className="text-[9px] font-bold text-brand-primary uppercase tracking-widest mb-2">Add New Method (e.g. bKash/Nagad)</p>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Method Name</label>
                                  <input type="text" required value={newCustomPayment.name} onChange={e => setNewCustomPayment({...newCustomPayment, name: e.target.value})} placeholder="bKash Personal" className="glass-input text-xs allow-select" />
                              </div>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Wallet Number / Details</label>
                                  <input type="text" required value={newCustomPayment.details} onChange={e => setNewCustomPayment({...newCustomPayment, details: e.target.value})} placeholder="017XXXXXXXX" className="glass-input text-xs font-mono allow-select" />
                              </div>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Instructions for User</label>
                                  <input type="text" value={newCustomPayment.instruction} onChange={e => setNewCustomPayment({...newCustomPayment, instruction: e.target.value})} placeholder="Send money and enter TRX ID below." className="glass-input text-xs allow-select" />
                              </div>
                              <button type="submit" className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-3 px-6 rounded-xl shadow-md text-[10px] uppercase tracking-widest mt-2 flex items-center justify-center gap-2"><Plus className="w-3 h-3"/> Add Method</button>
                          </form>

                          <div className="space-y-3">
                              {(!customPayments || customPayments.length === 0) ? (
                                  <p className="text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest py-4">No custom methods added.</p>
                              ) : (
                                  customPayments.map((p, idx) => (
                                      <div key={p.id || idx} className="bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl flex justify-between items-center animate-fade-in-up">
                                          <div>
                                              <p className="text-[11px] font-bold text-white uppercase tracking-wider">{p.name}</p>
                                              <p className="text-[9px] font-mono text-gray-400 mt-1 allow-select">{p.details}</p>
                                          </div>
                                          <button type="button" onClick={() => handleRemoveCustomPayment(p.id)} className="btn-animate p-2.5 bg-red-900/20 text-red-500 hover:bg-red-900/40 border border-red-900/50 rounded-lg shrink-0 transition-colors">
                                              <Trash2 className="w-4 h-4" />
                                          </button>
                                      </div>
                                  ))
                              )}
                          </div>
                        </div>
                    </div>
                  </div>
                )}
              </div>
            </>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
