<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Panel - Smart Area Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease-out; }
        .toast-leave { transform: translateY(0); opacity: 1; }
        .toast-leave-active { transform: translateY(100%); opacity: 0; transition: all 0.3s ease-in; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-bolt text-blue-600 text-2xl mr-2"></i>
                    <span class="font-bold text-xl tracking-tight text-gray-900">Smart SMS</span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm font-medium text-gray-600 bg-gray-100 px-3 py-1.5 rounded-full">
                        <i class="fa-regular fa-user mr-1"></i> Customer
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Get Numbers by Specific State</h1>
            <p class="text-gray-500">The system will automatically alert you if the API provides a different state.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Buy Number Section -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center">
                        <i class="fa-solid fa-cart-shopping mr-2 text-blue-500"></i> Buy New Number
                    </h2>
                    
                    <div class="space-y-4">
                        <!-- Country Selection -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
                            <div class="flex space-x-2">
                                <input type="text" id="input-country" value="USA" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition shadow-sm" placeholder="e.g., USA">
                                <button onclick="app.fetchRates()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-medium hover:bg-blue-100 transition whitespace-nowrap border border-blue-200">
                                    Load Services
                                </button>
                            </div>
                        </div>

                        <!-- Service Selection -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Select Service</label>
                            <select id="select-app" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition shadow-sm bg-white disabled:bg-gray-100" disabled>
                                <option value="">Load services first...</option>
                            </select>
                        </div>

                        <!-- Smart Area Code -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Area Code (for USA)</label>
                            <input type="text" id="input-areacode" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition shadow-sm font-mono" placeholder="e.g., 212, 718 or leave empty" maxlength="3">
                        </div>

                        <!-- Duration/Rental Selection -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Duration</label>
                            <select id="select-duration" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition shadow-sm bg-white">
                                <option value="15 minutes">15 Minutes (Regular OTP)</option>
                                <option value="3 days">3 Days (Rental)</option>
                                <option value="7 days">7 Days (Rental)</option>
                                <option value="14 days">14 Days (Rental)</option>
                                <option value="25 days">25 Days (Rental)</option>
                            </select>
                        </div>

                        <!-- Buy Button -->
                        <button id="btn-buy" onclick="app.buyNumber()" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition shadow-md disabled:opacity-50 flex justify-center items-center mt-2" disabled>
                            <span id="buy-text">Get Number</span>
                            <div id="buy-loader" class="hidden ml-2 loader border-2 border-white border-t-transparent rounded-full w-4 h-4"></div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Customer's Active Numbers -->
            <div class="lg:col-span-2 space-y-6">
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 min-h-[400px]">
                    <div class="flex justify-between items-center mb-4 border-b pb-3">
                        <h2 class="text-lg font-bold text-gray-900 flex items-center">
                            <i class="fa-solid fa-mobile-screen-button mr-2 text-green-500"></i> Your Numbers
                        </h2>
                    </div>
                    
                    <div id="active-numbers-container" class="space-y-4">
                        <div class="text-center py-12 text-gray-500 text-sm border-2 border-dashed border-gray-200 rounded-lg bg-gray-50">
                            <i class="fa-regular fa-folder-open text-3xl mb-3 text-gray-300"></i><br>
                            You haven't purchased any numbers yet.<br>Order a number from the left panel.
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        // USA Area Code Database (50 States)
        const stateToAreaCodes = {
            "Alabama": ["205", "251", "256", "334", "938"],
            "Alaska": ["907"],
            "Arizona": ["480", "520", "602", "623", "928"],
            "Arkansas": ["479", "501", "870"],
            "California": ["209", "213", "310", "323", "408", "415", "424", "442", "510", "530", "559", "562", "619", "626", "650", "657", "661", "707", "714", "747", "760", "805", "818", "831", "858", "909", "916", "925", "949", "951"],
            "Colorado": ["303", "719", "720", "970"],
            "Connecticut": ["203", "475", "860", "959"],
            "Delaware": ["302"],
            "Florida": ["239", "305", "321", "352", "386", "407", "561", "727", "754", "772", "786", "813", "850", "863", "904", "941", "954"],
            "Georgia": ["229", "404", "478", "678", "706", "762", "770", "912"],
            "Hawaii": ["808"],
            "Idaho": ["208", "986"],
            "Illinois": ["217", "224", "309", "312", "331", "618", "630", "708", "773", "815", "847", "872"],
            "Indiana": ["219", "260", "317", "463", "574", "765", "812", "930"],
            "Iowa": ["319", "515", "563", "641", "712"],
            "Kansas": ["316", "620", "785", "913"],
            "Kentucky": ["270", "364", "502", "606", "859"],
            "Louisiana": ["225", "318", "337", "504", "985"],
            "Maine": ["207"],
            "Maryland": ["240", "301", "410", "443", "667"],
            "Massachusetts": ["339", "351", "413", "508", "617", "774", "781", "857", "978"],
            "Michigan": ["231", "248", "269", "313", "586", "616", "734", "810", "906", "947", "989"],
            "Minnesota": ["218", "320", "507", "612", "651", "763", "952"],
            "Mississippi": ["228", "601", "662", "769"],
            "Missouri": ["314", "417", "573", "636", "660", "816"],
            "Montana": ["406"],
            "Nebraska": ["308", "402", "531"],
            "Nevada": ["702", "725", "775"],
            "New Hampshire": ["603"],
            "New Jersey": ["201", "551", "609", "732", "848", "856", "862", "908", "973"],
            "New Mexico": ["505", "575"],
            "New York": ["212", "315", "332", "347", "516", "518", "585", "607", "631", "646", "680", "716", "718", "845", "914", "917", "929"],
            "North Carolina": ["252", "336", "704", "828", "910", "919", "980", "984"],
            "North Dakota": ["701"],
            "Ohio": ["216", "234", "330", "419", "440", "513", "614", "740", "937"],
            "Oklahoma": ["405", "539", "580", "918"],
            "Oregon": ["503", "541", "971"],
            "Pennsylvania": ["215", "267", "412", "484", "570", "610", "717", "724", "814", "878"],
            "Rhode Island": ["401"],
            "South Carolina": ["803", "843", "864"],
            "South Dakota": ["605"],
            "Tennessee": ["423", "615", "731", "865", "901", "931"],
            "Texas": ["210", "214", "254", "281", "325", "361", "409", "430", "432", "469", "512", "682", "713", "737", "806", "817", "830", "832", "903", "915", "936", "940", "956", "972", "979"],
            "Utah": ["385", "435", "801"],
            "Vermont": ["802"],
            "Virginia": ["276", "540", "571", "703", "757", "804"],
            "Washington": ["206", "253", "360", "425", "509"],
            "West Virginia": ["304", "681"],
            "Wisconsin": ["262", "414", "534", "608", "715", "920"],
            "Wyoming": ["307"]
        };

        // Reverse map for identifying states based on 3-digit codes
        const areaCodeToState = {};
        for (const [state, codes] of Object.entries(stateToAreaCodes)) {
            codes.forEach(code => {
                areaCodeToState[code] = state;
            });
        }

        const app = {
            // ✅ আপনার Render এর লাইভ লিংকটি এখানে ব্যবহার করা হয়েছে
            baseUrl: 'https://verifyhub-backend-new.onrender.com/api', 
            activeNumbers: [],

            init() {},

            async callApi(endpoint, params = {}) {
                const queryStr = Object.keys(params)
                    .map(k => encodeURIComponent(k) + '=' + encodeURIComponent(params[k]))
                    .join('&');
                
                let targetUrl = `${this.baseUrl}/${endpoint}?${queryStr}`;

                try {
                    const response = await fetch(targetUrl, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });
                    return await response.json();
                } catch (error) {
                    return { success: false, error: 'Network Error! Please make sure the backend is running.' };
                }
            },

            // ডাটাবেসে সেভ করার জন্য POST রিকোয়েস্ট
            async saveToDatabase(data) {
                try {
                    await fetch(`${this.baseUrl}/save-number`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch (err) {
                    console.log("Database save error:", err);
                }
            },

            async fetchRates() {
                const country = document.getElementById('input-country').value.trim();
                if(!country) return this.showToast('Please enter a country name', 'error');

                const selectApp = document.getElementById('select-app');
                const btnBuy = document.getElementById('btn-buy');
                
                selectApp.innerHTML = '<option>Loading...</option>';
                selectApp.disabled = true;
                btnBuy.disabled = true;

                const res = await this.callApi('rates', { country: country });

                if (res.success && res.data) {
                    selectApp.innerHTML = '<option value="">-- Select a Service --</option>';
                    res.data.sort((a, b) => a.app.localeCompare(b.app));
                    
                    res.data.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.app;
                        option.textContent = `${item.app}`; 
                        selectApp.appendChild(option);
                    });
                    
                    selectApp.disabled = false;
                    selectApp.onchange = () => { btnBuy.disabled = selectApp.value === ""; };
                    
                    this.showToast(`Services loaded successfully`, 'success');
                } else {
                    selectApp.innerHTML = '<option value="">Failed to load</option>';
                    this.showToast(res.error || 'Failed to load services', 'error');
                }
            },

            async buyNumber() {
                const country = document.getElementById('input-country').value.trim();
                const appName = document.getElementById('select-app').value;
                const duration = document.getElementById('select-duration').value;
                const requestedAreacode = document.getElementById('input-areacode').value.trim();
                
                if(!country || !appName) return;

                this.setLoading('btn-buy', true);

                let params = { country: country, app: appName, duration: duration };
                if(requestedAreacode) {
                    params.areacode = requestedAreacode;
                    params.area_code = requestedAreacode; // Backup parameter
                }

                // API Call
                let res = await this.callApi('buy', params);

                this.setLoading('btn-buy', false);

                if (res.success && res.data) {
                    let numberReceived = res.data.number;
                    let receivedAreaCode = '';
                    let receivedStateName = 'Unknown State';
                    let requestedStateName = null;
                    let matchStatus = 'perfect'; // perfect, state-match, mismatched

                    // Extract area code from the received number
                    if(country.toUpperCase() === 'USA') {
                        let cleanNum = numberReceived.startsWith('1') && numberReceived.length === 11 ? numberReceived.substring(1) : numberReceived;
                        if(cleanNum.startsWith('+1')) cleanNum = cleanNum.substring(2);
                        
                        receivedAreaCode = cleanNum.substring(0, 3);
                        receivedStateName = areaCodeToState[receivedAreaCode] || 'Other States';
                        
                        // Check matching logic
                        if(requestedAreacode) {
                            requestedStateName = areaCodeToState[requestedAreacode];
                            
                            if(receivedAreaCode === requestedAreacode) {
                                matchStatus = 'perfect'; // Code matches perfectly
                            } else if (requestedStateName && requestedStateName === receivedStateName) {
                                matchStatus = 'state-match'; // Code didn't match, but state is correct
                            } else {
                                matchStatus = 'mismatched'; // Completely different state! API ignored code
                            }
                        }
                    }

                    if(matchStatus === 'mismatched') {
                        this.showToast(`Warning: API could not provide your code! This is a number from ${receivedStateName}.`, 'error');
                    } else {
                        this.showToast(`New number successfully purchased!`, 'success');
                    }
                    
                    const newNumberObj = {
                        id: res.data.id,
                        number: res.data.number,
                        app: appName,
                        country: country,
                        duration: duration,
                        receivedAreaCode: receivedAreaCode,
                        receivedStateName: receivedStateName,
                        requestedStateName: requestedStateName,
                        matchStatus: matchStatus,
                        status: 'waiting',
                        sms: '',
                        timeAdded: new Date()
                    };

                    this.activeNumbers.unshift(newNumberObj);
                    this.renderActiveNumbers();

                    // ✅ ডাটাবেসে সেভ করার কল
                    this.saveToDatabase(newNumberObj);

                } else {
                    let err = res.error || 'Failed to purchase number';
                    this.showToast(err, 'error');
                }
            },

            async checkSms(id, btnElement) {
                if(btnElement) btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Checking...';
                
                const res = await this.callApi('sms', { n_id: id });
                const numIndex = this.activeNumbers.findIndex(n => n.id === id);

                if (res.success) {
                    this.showToast('SMS received!', 'success');
                    if(numIndex > -1) {
                        this.activeNumbers[numIndex].status = 'received';
                        this.activeNumbers[numIndex].sms = res.message;
                        this.renderActiveNumbers();
                    }
                } else {
                    this.showToast(res.error || 'Code not arrived yet, please wait', 'warning');
                    if(btnElement) btnElement.innerHTML = '<i class="fa-solid fa-envelope"></i> Check SMS';
                }
            },

            async rejectNumber(id, btnElement) {
                if(!confirm('Are you sure you want to cancel this number?')) return;
                
                if(btnElement) btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

                const res = await this.callApi('reject', { n_id: id });

                if (res.success) {
                    this.showToast('Number has been canceled', 'success');
                    this.activeNumbers = this.activeNumbers.filter(n => n.id !== id);
                    this.renderActiveNumbers();
                } else {
                    this.showToast(res.error || 'Failed to cancel', 'error');
                    if(btnElement) btnElement.innerHTML = '<i class="fa-solid fa-xmark"></i> Cancel';
                }
            },

            // --- UI Rendering ---
            renderActiveNumbers() {
                const container = document.getElementById('active-numbers-container');
                container.innerHTML = '';

                if(this.activeNumbers.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 text-gray-500 text-sm border-2 border-dashed border-gray-200 rounded-lg bg-gray-50">
                            <i class="fa-regular fa-folder-open text-3xl mb-3 text-gray-300"></i><br>
                            You haven't purchased any numbers yet.<br>Order a number from the left panel.
                        </div>`;
                    return;
                }

                this.activeNumbers.forEach(item => {
                    const el = document.createElement('div');
                    
                    // Determine border color
                    let borderColor = 'border-l-blue-500';
                    if(item.status === 'received') borderColor = 'border-l-green-500';
                    else if(item.matchStatus === 'mismatched') borderColor = 'border-l-red-500';
                    
                    el.className = `p-5 rounded-lg border bg-white shadow-sm hover:shadow transition border-l-4 ${borderColor}`;
                    
                    let smsContent = '';
                    if(item.status === 'received') {
                        smsContent = `
                            <div class="mt-4 p-4 bg-green-50 border border-green-200 rounded-md text-green-800 font-mono text-base break-all">
                                <strong><i class="fa-solid fa-message mr-2"></i> Message:</strong> ${item.sms}
                            </div>
                        `;
                    }

                    let durationText = item.duration === '15 minutes' ? '15 Minutes' : item.duration;
                    
                    // Create Smart State Badge
                    let areaCodeBadge = '';
                    if(item.receivedAreaCode) {
                        if(item.matchStatus === 'perfect') {
                            areaCodeBadge = `<span class="text-xs font-medium text-green-700 bg-green-100 px-2 py-1 rounded border border-green-200"><i class="fa-solid fa-location-dot mr-1"></i> ${item.receivedStateName} (${item.receivedAreaCode})</span>`;
                        } else if (item.matchStatus === 'state-match') {
                            areaCodeBadge = `<span class="text-xs font-medium text-yellow-700 bg-yellow-100 px-2 py-1 rounded border border-yellow-200" title="Your requested code wasn't available, so a different code from the same state was provided"><i class="fa-solid fa-location-dot mr-1"></i> ${item.receivedStateName} (Diff code: ${item.receivedAreaCode})</span>`;
                        } else if (item.matchStatus === 'mismatched') {
                            areaCodeBadge = `<span class="text-xs font-bold text-red-700 bg-red-100 px-2 py-1 rounded border border-red-300" title="API failed to provide your requested state"><i class="fa-solid fa-triangle-exclamation mr-1"></i> API provided a different state: ${item.receivedStateName} (${item.receivedAreaCode})</span>`;
                        } else {
                            areaCodeBadge = `<span class="text-xs font-medium text-teal-700 bg-teal-100 px-2 py-1 rounded border border-teal-200"><i class="fa-solid fa-location-dot mr-1"></i> ${item.receivedStateName} (${item.receivedAreaCode})</span>`;
                        }
                    }

                    el.innerHTML = `
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <div class="flex items-center space-x-2 mb-2 flex-wrap gap-y-2">
                                    <span class="text-xs font-bold bg-blue-100 px-2 py-1 rounded text-blue-700 uppercase">${item.app}</span>
                                    <span class="text-xs font-medium text-gray-500 bg-gray-100 px-2 py-1 rounded">${item.country}</span>
                                    <span class="text-xs font-medium text-purple-700 bg-purple-100 px-2 py-1 rounded border border-purple-200">
                                        <i class="fa-regular fa-clock mr-1"></i> Duration: ${durationText}
                                    </span>
                                </div>
                                <div class="mb-2">
                                    ${areaCodeBadge}
                                </div>
                                <div class="font-mono text-2xl font-bold tracking-wider text-gray-900 select-all cursor-pointer" onclick="navigator.clipboard.writeText('${item.number}'); app.showToast('Number copied!', 'success')">
                                    +${item.number} <i class="fa-regular fa-copy text-sm text-gray-400 ml-1 hover:text-blue-500"></i>
                                </div>
                            </div>
                            <div class="flex sm:flex-col space-x-2 sm:space-x-0 sm:space-y-2 w-full sm:w-auto">
                                <button onclick="app.checkSms('${item.id}', this)" class="flex-1 bg-blue-50 text-blue-700 text-sm font-semibold px-4 py-2 rounded-lg border border-blue-200 hover:bg-blue-100 transition whitespace-nowrap flex items-center justify-center">
                                    <i class="fa-solid fa-envelope mr-2"></i> Check SMS
                                </button>
                                <button onclick="app.rejectNumber('${item.id}', this)" class="flex-1 text-red-500 text-sm font-medium hover:text-red-700 hover:bg-red-50 px-4 py-2 rounded-lg transition text-center border border-transparent hover:border-red-100">
                                    <i class="fa-solid fa-xmark mr-1"></i> Cancel
                                </button>
                            </div>
                        </div>
                        ${smsContent}
                        <div class="mt-3 text-xs text-gray-400 font-medium flex justify-between">
                            <span>Order ID: #${item.id}</span>
                            <span>Time: ${item.timeAdded.toLocaleTimeString('en-US')}</span>
                        </div>
                    `;
                    container.appendChild(el);
                });
            },

            setLoading(btnId, isLoading) {
                const btn = document.getElementById(btnId);
                const text = btn.querySelector('span');
                const loader = btn.querySelector('.loader');
                
                if(isLoading) {
                    btn.disabled = true;
                    text.classList.add('opacity-0');
                    loader.classList.remove('hidden');
                } else {
                    btn.disabled = false;
                    text.classList.remove('opacity-0');
                    loader.classList.add('hidden');
                }
            },

            showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                
                let bgClass = 'bg-gray-800';
                let icon = '<i class="fa-solid fa-circle-info text-blue-400"></i>';
                
                if(type === 'success') {
                    bgClass = 'bg-gray-900 border-l-4 border-green-500';
                    icon = '<i class="fa-solid fa-circle-check text-green-400"></i>';
                } else if (type === 'error') {
                    bgClass = 'bg-red-900 border-l-4 border-red-500';
                    icon = '<i class="fa-solid fa-circle-xmark text-red-400"></i>';
                } else if (type === 'warning') {
                    bgClass = 'bg-yellow-900 border-l-4 border-yellow-500';
                    icon = '<i class="fa-solid fa-triangle-exclamation text-yellow-400"></i>';
                }

                toast.className = `flex items-center space-x-3 px-4 py-3 rounded shadow-lg text-white text-sm toast-enter-active font-medium ${bgClass}`;
                toast.innerHTML = `${icon} <span>${message}</span>`;
                
                container.appendChild(toast);

                setTimeout(() => {
                    toast.classList.replace('toast-enter-active', 'toast-leave-active');
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
